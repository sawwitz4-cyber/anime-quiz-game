<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Путь Шиноби</title>
    <style>
        :root {
            --gold: #d4af37;
            --gold-soft: rgba(212, 175, 55, 0.16);
            --glass: rgba(15, 15, 20, 0.84);
            --glass-2: rgba(22, 22, 30, 0.92);
            --line: rgba(255,255,255,0.08);
            --text: #f4ecd1;
            --muted: #bfb79b;
            --danger: #8f1d1d;
            --danger-2: #c12b2b;
            --ok: #2f8f57;
            --shadow: 0 16px 40px rgba(0,0,0,0.45);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: var(--text);
            min-height: 100vh;
            background:
                radial-gradient(circle at top, rgba(212,175,55,0.10), transparent 28%),
                linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.55)),
                url("images/пещера.png") center / cover no-repeat,
                #050507;
        }

        .overlay {
            min-height: 100vh;
            padding: 16px 14px 24px;
            background:
                linear-gradient(180deg, rgba(0,0,0,0.38) 0%, rgba(0,0,0,0.72) 100%);
            display: flex;
            justify-content: center;
        }

        .page {
            width: 100%;
            max-width: 460px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .topbar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .chip {
            background: var(--glass);
            border: 1px solid rgba(212,175,55,0.22);
            border-radius: 16px;
            padding: 12px 10px;
            text-align: center;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        .chip .label {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 5px;
            letter-spacing: 0.4px;
        }

        .chip .value {
            font-size: 18px;
            font-weight: 800;
            color: #fff3bf;
        }

        .main-card {
            background: linear-gradient(180deg, var(--glass) 0%, var(--glass-2) 100%);
            border: 1px solid rgba(212,175,55,0.25);
            border-radius: 24px;
            padding: 16px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
        }

        .main-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(212,175,55,0.08), transparent 36%);
            pointer-events: none;
        }

        .floor-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            padding: 8px 16px;
            border-radius: 999px;
            background: linear-gradient(180deg, #f1d36f 0%, var(--gold) 100%);
            color: #231a02;
            font-weight: 900;
            letter-spacing: 0.5px;
            box-shadow: 0 0 18px rgba(212,175,55,0.35);
        }

        .event-art-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 14px;
        }

        .event-art {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 54px;
            background:
                radial-gradient(circle at 30% 30%, rgba(255,255,255,0.10), transparent 35%),
                linear-gradient(180deg, rgba(212,175,55,0.22), rgba(255,255,255,0.04));
            border: 1px solid rgba(212,175,55,0.28);
            box-shadow:
                0 0 0 8px rgba(212,175,55,0.04),
                0 0 30px rgba(212,175,55,0.14);
        }

        .event-name {
            margin: 0;
            text-align: center;
            font-size: 28px;
            color: #fff3be;
            letter-spacing: 0.6px;
        }

        .event-text {
            margin: 12px 0 14px;
            text-align: center;
            color: #e6dec1;
            line-height: 1.55;
            font-size: 15px;
            min-height: 68px;
        }

        .hp-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 14px;
        }

        .hp-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 13px;
            color: #dccf9f;
        }

        .bar {
            height: 12px;
            border-radius: 999px;
            background: rgba(0,0,0,0.35);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .bar-fill {
            height: 100%;
            width: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #8f1d1d 0%, #d94a4a 55%, #ff8d6b 100%);
            transition: width 0.35s ease;
        }

        .result-box {
            min-height: 44px;
            border-radius: 14px;
            padding: 10px 12px;
            margin-bottom: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--line);
            color: #d8d1b8;
            font-size: 13px;
            line-height: 1.5;
        }

        .choices {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 16px;
            padding: 15px 14px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
            box-shadow: var(--shadow);
        }

        .btn:active {
            transform: scale(0.98);
            opacity: 0.92;
        }

        .btn-main {
            background: linear-gradient(180deg, #f0d267 0%, var(--gold) 100%);
            color: #201701;
        }

        .btn-dark {
            background: linear-gradient(180deg, #252535 0%, #181824 100%);
            color: #f5e6b8;
            border: 1px solid rgba(212,175,55,0.20);
        }

        .btn-fight {
            background: linear-gradient(180deg, var(--danger-2) 0%, var(--danger) 100%);
            color: white;
        }

        .btn-ok {
            background: linear-gradient(180deg, #3aa56a 0%, var(--ok) 100%);
            color: white;
        }

        .return-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            padding: 14px 16px;
            border-radius: 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            color: #cfc7ad;
            box-shadow: var(--shadow);
        }

        .small-note {
            text-align: center;
            color: #a79f86;
            font-size: 12px;
            margin-top: 2px;
        }

        .fade-in {
            animation: fadeIn 0.28s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 380px) {
            .chip .value {
                font-size: 16px;
            }

            .event-name {
                font-size: 24px;
            }

            .event-art {
                width: 96px;
                height: 96px;
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="page">
            <div class="topbar">
                <div class="chip">
                    <div class="label">ЭТАЖ</div>
                    <div class="value" id="floor-val">1</div>
                </div>
                <div class="chip">
                    <div class="label">ЗОЛОТО</div>
                    <div class="value" id="gold-val">0</div>
                </div>
                <div class="chip">
                    <div class="label">HP</div>
                    <div class="value" id="hp-val">0 / 0</div>
                </div>
            </div>

            <div class="main-card fade-in">
                <div class="floor-badge">ПУТЬ ШИНОБИ</div>

                <div class="hp-box">
                    <div class="hp-top">
                        <span>Состояние героя</span>
                        <span id="hp-percent">100%</span>
                    </div>
                    <div class="bar">
                        <div id="hp-fill" class="bar-fill"></div>
                    </div>
                </div>

                <div class="event-art-wrap">
                    <div id="event-art" class="event-art">👣</div>
                </div>

                <h2 id="ev-name" class="event-name">ПЕРЕКРЕСТОК</h2>
                <div id="ev-text" class="event-text">Перед вами темный проход. Воздух густой, а впереди — неизвестность.</div>

                <div id="result-box" class="result-box">
                    Каждый шаг может принести золото, бой, ловушку или редкую удачу.
                </div>

                <div id="choices" class="choices">
                    <button class="btn btn-main" onclick="generateEvent()">ИДТИ ВПЕРЕД 👣</button>
                </div>
            </div>

            <a href="#" class="return-link" onclick="exitToVillage(); return false;">Вернуться в деревню</a>
            <div class="small-note">Состояние сохраняется автоматически</div>
        </div>
    </div>

    <script>
        let p = JSON.parse(localStorage.getItem('rpg_data')) || {
            name: "Шиноби",
            floor: 1,
            gold: 100,
            hp: 100,
            maxHp: 100
        };

        if (!p.name) {
            window.location.href = 'create.html';
        }

        if (!p.floor) p.floor = 1;
        if (typeof p.gold !== "number") p.gold = 100;
        if (typeof p.hp !== "number") p.hp = 100;
        if (typeof p.maxHp !== "number") p.maxHp = 100;

        let lastEventKey = null;

        const EVENTS = [
            {
                key: "fight_1",
                type: "fight",
                weight: 18,
                minFloor: 1,
                name: "ЗАСАДА",
                icon: "⚔️",
                text: "Из темноты выходит враг и преграждает путь."
            },
            {
                key: "fight_2",
                type: "fight",
                weight: 14,
                minFloor: 1,
                name: "РОНИН",
                icon: "🥷",
                text: "Одинокий ронин молча достает клинок."
            },
            {
                key: "elite_fight",
                type: "eliteFight",
                weight: 7,
                minFloor: 3,
                name: "ЭЛИТНЫЙ СТРАЖ",
                icon: "👹",
                text: "Перед вами сильный противник. Бой будет тяжелым."
            },
            {
                key: "chest",
                type: "gold",
                weight: 12,
                minFloor: 1,
                name: "СУНДУК",
                icon: "💰",
                text: "У стены стоит сундук, покрытый пылью и знаками клана."
            },
            {
                key: "stash",
                type: "goldBig",
                weight: 7,
                minFloor: 2,
                name: "ТАЙНИК",
                icon: "🪙",
                text: "За треснувшим камнем вы находите скрытый запас золота."
            },
            {
                key: "altar",
                type: "healFull",
                weight: 10,
                minFloor: 1,
                name: "АЛТАРЬ",
                icon: "⛩️",
                text: "Теплое свечение окутывает вас. Силы возвращаются."
            },
            {
                key: "spring",
                type: "healPart",
                weight: 10,
                minFloor: 1,
                name: "ИСТОЧНИК",
                icon: "💧",
                text: "Из камня бьет чистая вода. Она пахнет древней магией."
            },
            {
                key: "trap",
                type: "damage",
                weight: 10,
                minFloor: 1,
                name: "ЛОВУШКА",
                icon: "🕸️",
                text: "Пол под ногами дрогнул. Кажется, вы задели механизм."
            },
            {
                key: "merchant",
                type: "merchant",
                weight: 6,
                minFloor: 2,
                name: "СТРАННИК",
                icon: "🧳",
                text: "В полумраке сидит торговец. У него есть кое-что полезное."
            },
            {
                key: "secret",
                type: "skip",
                weight: 6,
                minFloor: 2,
                name: "ТАЙНЫЙ ХОД",
                icon: "🗝️",
                text: "Вы замечаете трещину в стене. За ней — короткий путь вниз."
            },
            {
                key: "camp",
                type: "rest",
                weight: 8,
                minFloor: 1,
                name: "ЗАБРОШЕННЫЙ ЛАГЕРЬ",
                icon: "🔥",
                text: "Здесь кто-то недавно отдыхал. Еще тлеют угли."
            },
            {
                key: "shrine",
                type: "blessing",
                weight: 7,
                minFloor: 2,
                name: "СВЯТИЛИЩЕ",
                icon: "✨",
                text: "Тихое место силы. Здесь можно попросить благословение."
            },
            {
                key: "shadow_game",
                type: "chanceGold",
                weight: 5,
                minFloor: 3,
                name: "ИГРА С ТЕНЬЮ",
                icon: "🎲",
                text: "Таинственная тень предлагает рискнуть золотом ради удачи."
            }
        ];

        function save() {
            localStorage.setItem('rpg_data', JSON.stringify(p));
        }

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }

        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function updateUI() {
            document.getElementById('floor-val').innerText = p.floor;
            document.getElementById('gold-val').innerText = Math.floor(p.gold);
            document.getElementById('hp-val').innerText = Math.floor(p.hp) + " / " + Math.floor(p.maxHp);

            const percent = Math.round((p.hp / p.maxHp) * 100);
            document.getElementById('hp-percent').innerText = percent + "%";
            document.getElementById('hp-fill').style.width = clamp(percent, 0, 100) + "%";
        }

        function setScene(title, text, icon) {
            document.getElementById('ev-name').innerText = title;
            document.getElementById('ev-text').innerText = text;
            document.getElementById('event-art').innerText = icon;
        }

        function setResult(text) {
            document.getElementById('result-box').innerText = text;
        }

        function setChoices(buttons) {
            const box = document.getElementById('choices');
            box.innerHTML = buttons.map(btn => {
                return `<button class="btn ${btn.className || 'btn-dark'}" onclick="${btn.action}">${btn.label}</button>`;
            }).join("");
        }

        function nextStep(steps = 1) {
            p.floor += steps;
            save();
            updateUI();
            generateEvent();
        }

        function exitToVillage() {
            p.lastUpdate = Date.now();
            save();
            window.location.href = 'index.html';
        }

        function pickEvent() {
            const available = EVENTS.filter(ev => p.floor >= ev.minFloor && ev.key !== lastEventKey);

            let totalWeight = 0;
            for (const ev of available) totalWeight += ev.weight;

            let roll = Math.random() * totalWeight;
            for (const ev of available) {
                roll -= ev.weight;
                if (roll <= 0) return ev;
            }
            return available[available.length - 1];
        }

        function generateEvent() {
            const ev = pickEvent();
            lastEventKey = ev.key;

            setScene(ev.name, ev.text, ev.icon);

            switch (ev.type) {
                case "fight":
                    setResult("Боевая встреча. Подготовьтесь.");
                    setChoices([
                        { label: "ВСТУПИТЬ В БОЙ", className: "btn-fight", action: "startFight('normal')" },
                        { label: "ОСТОРОЖНО ОТСТУПИТЬ", className: "btn-dark", action: "cautiousRetreat()" }
                    ]);
                    break;

                case "eliteFight":
                    setResult("Опасный противник. Награда будет выше обычной.");
                    setChoices([
                        { label: "ПРИНЯТЬ ВЫЗОВ", className: "btn-fight", action: "startFight('elite')" },
                        { label: "НЕ РИСКОВАТЬ", className: "btn-dark", action: "cautiousRetreat(2)" }
                    ]);
                    break;

                case "gold":
                    setResult("Пахнет удачей. Похоже, внутри есть награда.");
                    setChoices([
                        { label: "ОТКРЫТЬ СУНДУК", className: "btn-main", action: "takeGold(1)" },
                        { label: "ОСТАВИТЬ И ИДТИ ДАЛЬШЕ", className: "btn-dark", action: "nextStep(1)" }
                    ]);
                    break;

                case "goldBig":
                    setResult("Редкая находка. Можно сорвать хороший куш.");
                    setChoices([
                        { label: "ЗАБРАТЬ ДОБЫЧУ", className: "btn-main", action: "takeGold(2)" },
                        { label: "НЕ ТРОГАТЬ", className: "btn-dark", action: "nextStep(1)" }
                    ]);
                    break;

                case "healFull":
                    setResult("Святилище полностью восстановит ваши силы.");
                    setChoices([
                        { label: "ПРИНЯТЬ БЛАГОСЛОВЕНИЕ", className: "btn-ok", action: "healFull()" },
                        { label: "ПРОЙТИ МИМО", className: "btn-dark", action: "nextStep(1)" }
                    ]);
                    break;

                case "healPart":
                    setResult("Источник может восстановить часть здоровья.");
                    setChoices([
                        { label: "ИСПИТЬ ВОДЫ", className: "btn-ok", action: "healPart()" },
                        { label: "ПРОЙТИ МИМО", className: "btn-dark", action: "nextStep(1)" }
                    ]);
                    break;

                case "damage":
                    setResult("Нужно решить быстро, иначе будет больно.");
                    setChoices([
                        { label: "ПОПЫТАТЬСЯ ОБЕЗВРЕДИТЬ", className: "btn-main", action: "triggerTrap(true)" },
                        { label: "РВАНУТЬ ВПЕРЕД", className: "btn-dark", action: "triggerTrap(false)" }
                    ]);
                    break;

                case "merchant":
                    setResult("Торговец принимает только золото.");
                    setChoices([
                        { label: "КУПИТЬ ЛЕЧЕНИЕ — 30💰", className: "btn-main", action: "merchantHeal()" },
                        { label: "УСИЛИТЬ ТЕЛО — 60💰", className: "btn-main", action: "merchantMaxHp()" },
                        { label: "УЙТИ", className: "btn-dark", action: "nextStep(1)" }
                    ]);
                    break;

                case "skip":
                    setResult("Есть шанс быстро спуститься ниже.");
                    setChoices([
                        { label: "ПРОБРАТЬСЯ ТАЙНЫМ ХОДОМ", className: "btn-main", action: "secretPassage()" },
                        { label: "ИДТИ КАК ОБЫЧНО", className: "btn-dark", action: "nextStep(1)" }
                    ]);
                    break;

                case "rest":
                    setResult("Можно перевести дух и перевязать раны.");
                    setChoices([
                        { label: "ОТДОХНУТЬ", className: "btn-ok", action: "restCamp()" },
                        { label: "НЕ ЗАДЕРЖИВАТЬСЯ", className: "btn-dark", action: "nextStep(1)" }
                    ]);
                    break;

                case "blessing":
                    setResult("Сила места отвечает не всем одинаково.");
                    setChoices([
                        { label: "ПОМОЛИТЬСЯ", className: "btn-main", action: "shrineBlessing()" },
                        { label: "УЙТИ", className: "btn-dark", action: "nextStep(1)" }
                    ]);
                    break;

                case "chanceGold":
                    setResult("Ставка: 25 золота. Шанс удвоить или потерять все.");
                    setChoices([
                        { label: "СЫГРАТЬ", className: "btn-main", action: "shadowGame()" },
                        { label: "ОТКАЗАТЬСЯ", className: "btn-dark", action: "nextStep(1)" }
                    ]);
                    break;
            }
        }

        function showContinue(message, steps = 1, title = null, icon = null) {
            if (title && icon) {
                setScene(title, message, icon);
            }
            setResult(message);
            setChoices([
                { label: "ИДТИ ДАЛЬШЕ 👣", className: "btn-main", action: `nextStep(${steps})` }
            ]);
            updateUI();
            save();
        }

        function cautiousRetreat(extraSteps = 1) {
            const loss = randomInt(3, 8) + Math.floor(p.floor * 1.5);
            p.hp = Math.max(1, p.hp - loss);
            showContinue("Вы отступили, но получили " + loss + " урона, уходя от опасности.", extraSteps);
        }

        function startFight(kind) {
            if (kind === "elite") {
                p.currentEnemyName = "Элитный страж";
                p.currentEnemyHP = 90 + (p.floor * 38);
                p.currentEnemyDmg = 18 + (p.floor * 6);
                p.currentEnemyRewardGold = 55 + (p.floor * 10);
            } else {
                p.currentEnemyName = "Враг подземелья";
                p.currentEnemyHP = 50 + (p.floor * 28);
                p.currentEnemyDmg = 10 + (p.floor * 5);
                p.currentEnemyRewardGold = 22 + (p.floor * 6);
            }

            save();
            window.location.href = 'battle.html';
        }

        function takeGold(multiplier) {
            const base = 18 + p.floor * 5;
            const gain = multiplier === 2 ? base + randomInt(20, 40) : base + randomInt(5, 18);
            p.gold += gain;
            showContinue("Вы получаете +" + gain + " золота.", 1);
        }

        function healFull() {
            const restored = p.maxHp - p.hp;
            p.hp = p.maxHp;
            showContinue("Алтарь полностью восстановил силы. Восстановлено " + restored + " HP.", 1);
        }

        function healPart() {
            const heal = Math.min(p.maxHp - p.hp, randomInt(20, 40) + Math.floor(p.floor * 2));
            p.hp += heal;
            showContinue("Чистая вода исцелила вас на +" + heal + " HP.", 1);
        }

        function triggerTrap(careful) {
            let dmg;
            if (careful) {
                const success = Math.random() < 0.6;
                if (success) {
                    const smallGold = randomInt(6, 18);
                    p.gold += smallGold;
                    showContinue("Вы обезвредили ловушку и нашли внутри механизм с тайником: +" + smallGold + " золота.", 1);
                    return;
                }
                dmg = randomInt(8, 16) + Math.floor(p.floor * 2);
            } else {
                dmg = randomInt(12, 22) + Math.floor(p.floor * 3);
            }

            p.hp = Math.max(1, p.hp - dmg);
            showContinue("Ловушка сработала. Вы теряете " + dmg + " HP.", 1);
        }

        function merchantHeal() {
            if (p.gold < 30) {
                setResult("Недостаточно золота. Нужно 30💰.");
                return;
            }
            const heal = Math.min(p.maxHp - p.hp, Math.floor(p.maxHp * 0.45));
            p.gold -= 30;
            p.hp += heal;
            showContinue("Торговец продал вам зелье. Восстановлено +" + heal + " HP.", 1);
        }

        function merchantMaxHp() {
            if (p.gold < 60) {
                setResult("Недостаточно золота. Нужно 60💰.");
                return;
            }
            p.gold -= 60;
            p.maxHp += 15;
            p.hp = Math.min(p.maxHp, p.hp + 15);
            showContinue("Ваше тело стало крепче. Максимум HP увеличен на +15.", 1);
        }

        function secretPassage() {
            const gain = randomInt(8, 20);
            p.gold += gain;
            showContinue("Вы нашли короткий путь и дополнительно собрали +" + gain + " золота по дороге.", 2);
        }

        function restCamp() {
            const heal = Math.min(p.maxHp - p.hp, randomInt(12, 28));
            p.hp += heal;
            showContinue("Короткий отдых помог восстановить +" + heal + " HP.", 1);
        }

        function shrineBlessing() {
            const roll = Math.random();
            if (roll < 0.45) {
                const heal = Math.min(p.maxHp - p.hp, randomInt(18, 36));
                p.hp += heal;
                showContinue("Святилище ответило мягким светом. Вы восстановили +" + heal + " HP.", 1);
            } else if (roll < 0.8) {
                p.maxHp += 10;
                p.hp += 10;
                showContinue("Благословение укрепило ваше тело. Максимум HP увеличен на +10.", 1);
            } else {
                const gain = randomInt(25, 55);
                p.gold += gain;
                showContinue("Перед алтарем вы нашли редкое подношение: +" + gain + " золота.", 1);
            }
        }

        function shadowGame() {
            if (p.gold < 25) {
                setResult("Для игры нужно минимум 25 золота.");
                return;
            }

            p.gold -= 25;
            const win = Math.random() < 0.5;

            if (win) {
                const prize = 50 + randomInt(0, 25);
                p.gold += prize;
                showContinue("Тень проиграла. Вы выигрываете " + prize + " золота.", 1);
            } else {
                showContinue("Тень растворилась во мраке. Ставка потеряна.", 1);
            }
        }

        updateUI();
    </script>
</body>
</html>
