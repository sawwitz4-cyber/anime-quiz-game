<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0d0d12; color: #f4e4bc; font-family: sans-serif; padding: 20px; }
        .hero-card { background: linear-gradient(135deg, #1a1a24, #2b1d0e); border: 2px solid #d4af37; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .stat-line { display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding: 8px 0; }
        .inv-box { background: #111; border: 1px solid #444; border-radius: 15px; padding: 15px; min-height: 100px; }
        .back-btn { display: block; text-align: center; margin-top: 30px; color: #d4af37; text-decoration: none; }
    </style>
</head>
<body>
    <div class="hero-card">
        <h2 id="p-name" style="margin:0; color:#d4af37;">---</h2>
        <p id="p-class" style="font-style:italic; margin-top:5px; color:#888;">---</p>
        
        <div class="stat-line"><span>❤️ Здоровье:</span> <b id="p-hp">0/0</b></div>
        <div class="stat-line"><span>⚔️ Урон:</span> <b id="p-dmg">0</b></div>
        <div class="stat-line"><span>⚡ Скорость:</span> <b id="p-spd">0</b></div>
    </div>

    <h3>🎒 ТВОЯ СУМКА</h3>
    <div class="inv-box" id="inv-list">Пусто...</div>

    <a href="index.html" class="back-btn">← Вернуться в меню</a>

    <script>
        let p = JSON.parse(localStorage.getItem('rpg_data'));
        if (p) {
            document.getElementById('p-name').innerText = p.name;
            document.getElementById('p-class').innerText = p.classTitle;
            document.getElementById('p-hp').innerText = p.hp + "/" + p.maxHp;
            document.getElementById('p-dmg').innerText = p.dmg;
            document.getElementById('p-spd').innerText = p.spd;
            if (p.inv.length > 0) document.getElementById('inv-list').innerHTML = p.inv.join("<br>");
        }
    </script>
</body>
</html>
