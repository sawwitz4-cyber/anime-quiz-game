<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI D&D Master</title>
    
    <!-- Скрипты (строго правильные ссылки на .js файлы) -->
    <script src="https://telegram.org"></script>
    <script src="https://adsgram.ai"></script>
    
    <style>
        :root { --gold: #d4af37; --bg: #0d0d12; --card: #1a1a24; --energy: #00ffcc; }
        body { background: var(--bg); color: #f4e4bc; font-family: sans-serif; margin: 0; padding: 0; text-align: center; }
        
        .stats-bar { display: flex; justify-content: space-around; background: #111; padding: 10px; border-bottom: 2px solid var(--gold); font-weight: bold; font-size: 14px; position: sticky; top: 0; z-index: 100; }
        .energy-txt { color: var(--energy); }
        .gold-txt { color: var(--gold); }

        .container { padding: 15px; }
        .glass-card { background: var(--card); border: 1px solid var(--gold); border-radius: 15px; padding: 20px; min-height: 140px; text-align: left; line-height: 1.6; margin-bottom: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); font-style: italic; }
        
        #dice { width: 65px; height: 65px; background: #880808; color: white; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 26px; font-weight: bold; border-radius: 12px; border: 2px solid var(--gold); box-shadow: 0 0 15px rgba(212,175,55,0.3); transition: 0.3s; }
        
        .btn-opt { background: #2b1d0e; border: 1px solid var(--gold); color: var(--gold); padding: 16px; width: 100%; border-radius: 12px; font-size: 15px; margin-bottom: 12px; cursor: pointer; font-weight: bold; display: block; }
        .btn-opt:active { background: var(--gold); color: #000; }
        .btn-ad { background: linear-gradient(45deg, #00b09b, #96c93d); color: white; border: none; }
        
        #loading { display: none; color: var(--gold); font-style: italic; margin-bottom: 10px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .roll-anim { animation: shake 0.3s infinite; }
        @keyframes shake { 0% {transform: rotate(5deg)} 50% {transform: rotate(-5deg)} 100% {transform: rotate(5deg)} }
    </style>
</head>
<body>

    <div class="stats-bar">
        <span class="energy-txt">⚡ Энергия: <span id="energy-val">10</span>/10</span>
        <span class="gold-txt">💰 Золото: <span id="gold-val">50</span></span>
    </div>

    <div class="container">
        <div id="dice">d20</div>
        <div id="loading">Мастер читает свитки...</div>
        
        <div class="glass-card" id="story-text">
            Мастер: Приключение начинается! Вы стоите на развилке перед древним лесом. Слышны странные звуки. Ваши действия?
        </div>

        <div id="options-area">
            <button class="btn-opt" onclick="sendAction('Уверенно войти в лес')">🌲 Войти в лес</button>
            <button class="btn-opt" onclick="sendAction('Осмотреться и поискать следы')">🔎 Искать следы</button>
            <button class="btn-opt" onclick="sendAction('Закричать: Эй, кто там?!')">🗣️ Закричать</button>
        </div>

        <div id="monetize-area" style="display:none;">
            <p style="color:#ff4d4d; font-weight:bold;">Ходы закончились!</p>
            <button class="btn-opt btn-ad" onclick="watchAd()">📺 +3 Энергии за Рекламу</button>
        </div>
    </div>

    <script>
        // --- 1. ПЕРЕМЕННЫЕ ---
        let energy = 10;
        let gold = 50;
        let history = [];
        const HF_TOKEN = "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"; 
        const MODEL = "Qwen/Qwen2.5-72B-Instruct";

        // --- 2. ИНИЦИАЛИЗАЦИЯ TG ---
        let tg = window.Telegram ? window.Telegram.WebApp : null;
        if (tg) { tg.ready(); tg.expand(); }

        // Эмуляция Adsgram для тестов
        const AdController = (window.Adsgram && window.Adsgram.init) ? window.Adsgram.init({ blockId: "4841" }) : {
            show: () => new Promise(res => { alert("Энергия восстановлена (+3)"); res(); })
        };

        // --- 3. ЛОГИКА ---
        function updateUI() {
            document.getElementById('energy-val').innerText = energy;
            document.getElementById('gold-val').innerText = gold;
            const optArea = document.getElementById('options-area');
            const monArea = document.getElementById('monetize-area');
            
            if (energy <= 0) {
                optArea.style.display = 'none';
                monArea.style.display = 'block';
            } else {
                optArea.style.display = 'block';
                monArea.style.display = 'none';
            }
        }

        async function watchAd() {
            AdController.show().then(() => {
                energy += 3; updateUI();
            }).catch(() => alert("Реклама не готова"));
        }

        async function sendAction(text) {
            if (energy <= 0) return;
            energy--; updateUI();
            
            const die = document.getElementById('dice');
            const loader = document.getElementById('loading');
            const storyEl = document.getElementById('story-text');
            const optArea = document.getElementById('options-area');
            
            loader.style.display = "block";
            die.classList.add('roll-anim');
            optArea.style.opacity = "0.5";
            optArea.style.pointerEvents = "none";

            const roll = Math.floor(Math.random() * 20) + 1;

            try {
                // Прямой URL к API Hugging Face
                const response = await fetch(`https://huggingface.co{MODEL}/v1/chat/completions`, {
                    headers: { 
                        Authorization: `Bearer ${HF_TOKEN}`, 
                        "Content-Type": "application/json" 
                    },
                    method: "POST",
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [
                            {role: "system", content: "Ты мастер D&D. Кратко опиши результат действия игрока (2 фразы) по броску кубика. Дай ровно 3 варианта через разделитель |. Формат: История... | Вариант 1 | Вариант 2 | Вариант 3"},
                            ...history.slice(-4),
                            {role: "user", content: `Бросок: ${roll}. Действие: ${text}`}
                        ],
                        max_tokens: 250
                    }),
                });

                const result = await response.json();
                
                // Проверка: ответ может быть в разных форматах в зависимости от версии API
                const aiText = result.choices[0].message.content;
                history.push({role: "assistant", content: aiText});

                // Парсинг
                const parts = aiText.split('|');
                storyEl.innerText = parts[0].trim();
                die.innerText = roll;
                die.classList.remove('roll-anim');

                // Кнопки
                optArea.innerHTML = "";
                for(let i=1; i < parts.length; i++) {
                    const cleanOpt = parts[i].trim();
                    if(cleanOpt.length < 2) continue;
                    const btn = document.createElement('button');
                    btn.className = "btn-opt";
                    btn.innerText = cleanOpt;
                    btn.onclick = () => sendAction(cleanOpt);
                    optArea.appendChild(btn);
                }
            } catch (e) {
                console.error(e);
                alert("Мастер задумался. Если ты в браузере - это блокировка CORS. Залей файл на GitHub и проверяй в Telegram!");
                energy++; updateUI();
                die.classList.remove('roll-anim');
            } finally {
                loader.style.display = "none";
                optArea.style.opacity = "1";
                optArea.style.pointerEvents = "auto";
            }
        }

        updateUI();
    </script>
</body>
</html>
