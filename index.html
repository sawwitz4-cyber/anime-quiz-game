<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anime Battle RPG</title>
    <!-- ИСПРАВЛЕННАЯ ССЫЛКА НА СКРИПТ -->
    <script src="https://telegram.org"></script>
    <style>
        :root { --neon: #00ffcc; --bg: #05050a; --red: #ff4d4d; --blue: #0099ff; --gold: #f1c40f; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; user-select: none; }
        
        .screen { display: none; padding: 15px; height: 100vh; flex-direction: column; align-items: center; box-sizing: border-box; }
        .active { display: flex; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Карточки и Панели */
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 15px; width: 100%; margin-bottom: 10px; }
        .btn { background: #16213e; border: 1px solid var(--neon); color: white; padding: 14px; border-radius: 12px; margin: 5px; width: 95%; font-weight: bold; cursor: pointer; text-align: center; font-size: 16px; }
        .btn-main { background: linear-gradient(90deg, #e94560, #ff2e63); border: none; }
        
        /* HP / Mana Bars */
        .bar-wrap { width: 100%; height: 10px; background: #222; border-radius: 5px; overflow: hidden; margin: 4px 0; }
        .bar-fill { height: 100%; width: 100%; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Боевой интерфейс */
        #question { font-size: 18px; padding: 15px; text-align: center; color: var(--neon); min-height: 40px; }
        #slots { display: flex; gap: 5px; justify-content: center; margin-bottom: 15px; }
        .slot { width: 25px; height: 35px; border-bottom: 2px solid var(--neon); font-size: 24px; text-align: center; }
        #letters { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; }
        .letter { background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 12px 0; border-radius: 10px; text-align: center; font-weight: bold; }

        /* Скиллы */
        .skills-row { display: flex; gap: 10px; width: 100%; margin-top: 15px; }
        .skill { flex: 1; padding: 10px; border-radius: 10px; font-size: 11px; text-align: center; border: 1px solid var(--blue); background: rgba(0, 153, 255, 0.1); }

        /* Эффекты */
        .damage-pop { position: absolute; color: var(--red); font-weight: bold; font-size: 30px; animation: flyUp 0.8s forwards; pointer-events: none; }
        @keyframes flyUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-60px); } }
        .shake { animation: shake 0.2s infinite; }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(4px, 4px); } 75% { transform: translate(-4px, -4px); } }
        
        input { background: #1a1a2e; border: 1px solid var(--neon); color: white; padding: 15px; border-radius: 12px; width: 80%; margin: 15px 0; font-size: 16px; }
    </style>
</head>
<body>

    <!-- ЭКРАН 1: СОЗДАНИЕ -->
    <div id="scr-create" class="screen">
        <h1 style="color: var(--neon)">НОВЫЙ ПУТЬ</h1>
        <input type="text" id="p-name-in" placeholder="Имя героя...">
        <p>Выбери класс:</p>
        <div class="btn" style="border-color: var(--gold)" onclick="pick('🛡️ Паладин', 180, 20, 40, 'pal')">🛡️ ПАЛАДИН (Танк)</div>
        <div class="btn" style="border-color: var(--blue)" onclick="pick('🔮 Маг', 90, 55, 100, 'mag')">🔮 МАГ (ДД)</div>
        <div class="btn" style="border-color: var(--red)" onclick="pick('🗡️ Убийца', 110, 35, 60, 'ass')">🗡️ УБИЙЦА (Крит)</div>
        <button id="btn-start" class="btn btn-main" style="display:none; margin-top: 20px;" onclick="initSave()">ПРОБУДИТЬ СИЛУ</button>
    </div>

    <!-- ЭКРАН 2: МЕНЮ -->
    <div id="scr-menu" class="screen">
        <div class="glass">
            <div style="display:flex; justify-content: space-between;">
                <span id="m-name" style="font-weight:bold; color:var(--neon)">---</span>
                <span style="color:var(--gold)">💰 <b id="m-gold">0</b></span>
            </div>
            <div id="m-job" style="font-size:12px; color:#888; margin-top:5px;">Класс</div>
        </div>
        <div style="flex-grow: 1; display:flex; align-items: center;">
            <img src="https://icons8.com" id="hero-img">
        </div>
        <button class="btn btn-main" onclick="startBattle()">⚔️ ВСТУПИТЬ В БОЙ</button>
        <div style="display:flex; width:100%; gap:10px;">
            <button class="btn" style="flex:1" onclick="openShop()">🛒 ЛАВКА</button>
            <button class="btn" style="flex:1" onclick="show('scr-inv')">🎒 СУМКА</button>
        </div>
        <button class="btn" onclick="resetGame()" style="border:none; opacity:0.3; font-size:10px;">СБРОС ДАННЫХ</button>
    </div>

    <!-- ЭКРАН 3: БИТВА -->
    <div id="scr-battle" class="screen">
        <div class="glass" style="padding:10px;">
            <div style="display:flex; justify-content: space-between; font-size:11px;"><span>ОРОЧИМАРУ</span><span id="b-hp-txt">100/100</span></div>
            <div class="bar-wrap"><div id="b-fill" class="bar-fill" style="background:var(--red)"></div></div>
            <div style="display:flex; justify-content: space-between; font-size:11px; margin-top:8px;"><span>ВЫ</span><span id="p-hp-txt">100/100</span></div>
            <div class="bar-wrap"><div id="p-fill" class="bar-fill" style="background:var(--neon)"></div></div>
            <div class="bar-wrap" style="height:4px; margin-top:6px;"><div id="m-fill" class="bar-fill" style="background:var(--blue)"></div></div>
        </div>

        <div id="question">ЗАГРУЗКА...</div>
        <div id="slots"></div>
        <div id="letters"></div>

        <div class="skills-row" id="skill-btns"></div>
        <button class="btn" onclick="exitBattle()" style="margin-top:auto; font-size:12px; border-color:#444;">🏳️ ПОБЕГ</button>
    </div>

    <!-- ЭКРАН 4: МАГАЗИН -->
    <div id="scr-shop" class="screen">
        <h2 style="color:var(--gold)">КЛАССОВАЯ ЛАВКА</h2>
        <div id="shop-items" style="width:100%"></div>
        <button class="btn" onclick="show('scr-menu')" style="margin-top:auto">НАЗАД</button>
    </div>

    <!-- ЭКРАН 5: ИНВЕНТАРЬ -->
    <div id="scr-inv" class="screen">
        <h2>ВАШИ ВЕЩИ</h2>
        <div id="inv-list" class="glass"></div>
        <button class="btn" onclick="show('scr-menu')" style="margin-top:20px">НАЗАД</button>
    </div>

    <script>
        // БЕЗОПАСНАЯ ИНИЦИАЛИЗАЦИЯ
        let tg = window.Telegram ? window.Telegram.WebApp : null;
        if (!tg || !tg.initDataUnsafe.user) {
            tg = { ready:()=>{}, expand:()=>{}, HapticFeedback:{notificationOccurred:()=>{}}, initDataUnsafe:{user:{first_name:"Герой"}}, sendData:()=>{} };
        } else { tg.ready(); tg.expand(); }

        let player = { name: "", job: "", jobKey: "", gold: 100, hp: 100, maxHp: 100, dmg: 20, mana: 50, maxMana: 50, inv: [], skills: [] };
        const questions = [{q: "Имя девятихвостого?", a: "КУРАМА"}, {q: "Учитель Наруто?", a: "КАКАШИ"}, {q: "Пират в шляпе?", a: "ЛУФФИ"}];
        let bHp = 100, curInput = "", curQ = {}, timers = [];

        function show(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            updateMenuUI();
        }

        function pick(job, hp, dmg, mana, key) {
            player.job = job; player.maxHp = hp; player.hp = hp; player.dmg = dmg; player.maxMana = mana; player.mana = mana; player.jobKey = key;
            document.getElementById('btn-start').style.display = 'block';
        }

        function initSave() {
            player.name = document.getElementById('p-name-in').value || tg.initDataUnsafe.user.first_name;
            save(); show('scr-menu');
        }

        function updateMenuUI() {
            document.getElementById('m-name').innerText = player.name;
            document.getElementById('m-gold').innerText = player.gold;
            document.getElementById('m-job').innerText = player.job;
            document.getElementById('inv-list').innerText = player.inv.length ? player.inv.join(', ') : "Сумка пуста";
        }

        function openShop() {
            const box = document.getElementById('shop-items'); box.innerHTML = "";
            const goods = {
                pal: [{n: "🛡️ Щит (+40 HP)", c: 80, f:()=>{player.maxHp+=40; player.inv.push("Щит");}}, {n: "✨ Книга Света (Скилл: Лечение)", c: 150, f:()=>{player.skills.push('heal');}}],
                mag: [{n: "📖 Посох (Скилл: Огонь)", c: 100, f:()=>{player.skills.push('fire');}}, {n: "🧪 Эликсир (+30 маны)", c: 70, f:()=>{player.maxMana+=30;}}],
                ass: [{n: "🧪 Яд (Скилл: Смерть)", c: 120, f:()=>{player.skills.push('poison');}}, {n: "🗡️ Кинжал (+15 урон)", c: 90, f:()=>{player.dmg+=15;}}]
            };
            goods[player.jobKey].forEach(g => {
                let b = document.createElement('div'); b.className = "btn"; b.innerText = `${g.n} - ${g.c}г`;
                b.onclick = () => {
                    if(player.gold >= g.c) { player.gold -= g.c; g.f(); save(); alert("Куплено!"); openShop(); }
                    else alert("Мало золота!");
                };
                box.appendChild(b);
            });
            show('scr-shop');
        }

        function startBattle() {
            bHp = 100; player.hp = player.maxHp; player.mana = player.maxMana;
            renderQ(); renderSkills(); updateBars(); show('scr-battle');
            timers.push(setInterval(() => {
                player.hp -= 15; updateBars(); popDmg(false);
                if(player.hp <= 0) endBattle("ТЫ ПРОИГРАЛ!");
            }, 7000));
        }

        function renderSkills() {
            const box = document.getElementById('skill-btns'); box.innerHTML = "";
            const data = {
                fire: {n:"🔥 ФАЕРБОЛ", m:35, f:()=>{bHp-=45;}},
                heal: {n:"💚 ЛЕЧЕНИЕ", m:25, f:()=>{player.hp=Math.min(player.maxHp, player.hp+50);}},
                poison: {n:"🗡️ КРИТ", m:30, f:()=>{bHp-=65;}}
            };
            player.skills.forEach(id => {
                let s = data[id];
                let d = document.createElement('div'); d.className = "skill"; d.innerText = `${s.n}\n(${s.m}💧)`;
                d.onclick = () => {
                    if(player.mana >= s.m) { player.mana -= s.m; s.f(); updateBars(); popDmg(true); if(bHp<=0) endBattle("БОСС ПОВЕРЖЕН!"); }
                };
                box.appendChild(d);
            });
        }

        function renderQ() {
            curQ = questions[Math.floor(Math.random()*questions.length)]; curInput = "";
            document.getElementById('question').innerText = curQ.q;
            const sBox = document.getElementById('slots'); sBox.innerHTML = curQ.a.split('').map(()=>`<div class="slot"></div>`).join('');
            const lBox = document.getElementById('letters'); lBox.innerHTML = "";
            (curQ.a + "АБВГ").split('').sort(()=>Math.random()-0.5).forEach(c => {
                let b = document.createElement('div'); b.className="letter"; b.innerText=c;
                b.onclick = () => {
                    if(curInput.length < curQ.a.length) {
                        sBox.children[curInput.length].innerText = c; curInput += c; b.style.opacity = "0.2"; b.style.pointerEvents = "none";
                        if(curInput === curQ.a) { bHp -= player.dmg; popDmg(true); updateBars(); if(bHp<=0) { player.gold+=40; save(); endBattle("ПОБЕДА! +40г"); } else renderQ(); }
                        else if(curInput.length === curQ.a.length) { tg.HapticFeedback.notificationOccurred('error'); setTimeout(renderQ, 1000); }
                    }
                };
                lBox.appendChild(b);
            });
        }

        function popDmg(isBoss) {
            const p = document.createElement('div'); p.className = "damage-pop";
            p.innerText = isBoss ? `-${player.dmg}` : `-15`;
            p.style.left = "50%"; p.style.top = isBoss ? "20%" : "50%";
            document.body.appendChild(p); setTimeout(()=>p.remove(), 800);
            if(!isBoss) { document.body.classList.add('shake'); setTimeout(()=>document.body.classList.remove('shake'), 200); }
        }

        function updateBars() {
            document.getElementById('b-fill').style.width = bHp + "%";
            document.getElementById('p-fill').style.width = (player.hp/player.maxHp*100) + "%";
            document.getElementById('m-fill').style.width = (player.mana/player.maxMana*100) + "%";
            document.getElementById('b-hp-txt').innerText = Math.max(0, bHp) + "/100";
            document.getElementById('p-hp-txt').innerText = Math.max(0, player.hp) + "/" + player.maxHp;
        }

        function endBattle(m) { timers.forEach(clearInterval); timers=[]; alert(m); show('scr-menu'); }
        function exitBattle() { timers.forEach(clearInterval); timers=[]; show('scr-menu'); }
        function save() { localStorage.setItem('anime_rpg_vfinal', JSON.stringify(player)); }
        function resetGame() { localStorage.clear(); location.reload(); }

        const saved = localStorage.getItem('anime_rpg_vfinal');
        if(saved) { player = JSON.parse(saved); show('scr-menu'); } else { show('scr-create'); }
    </script>
</body>
</html>
