<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        :root { --neon: #00ffcc; --bg: #0a0a12; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; }
        
        /* Все экраны скрыты по умолчанию */
        .screen { display: none; padding: 20px; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box; }
        
        /* Только активный экран виден */
        .active { display: flex !important; }

        .btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 18px; 
               border-radius: 15px; font-size: 16px; font-weight: bold; width: 100%; margin: 10px 0; cursor: pointer; }
        .btn-main { background: linear-gradient(90deg, #e94560, #ff2e63); border: none; }
        
        input { background: #1a1a2e; border: 1px solid var(--neon); color: white; padding: 15px; border-radius: 12px; width: 90%; margin: 20px 0; font-size: 18px; }
        
        .hero-img { width: 150px; height: 150px; border-radius: 50%; border: 3px solid var(--neon); margin: 20px; box-shadow: 0 0 15px var(--neon); }
    </style>
</head>
<body>

    <!-- ЭКРАН 1: СОЗДАНИЕ -->
    <div id="screen-create" class="screen">
        <h1 style="color: var(--neon)">НОВЫЙ ГЕРОЙ</h1>
        <input type="text" id="p-name-input" placeholder="Введите имя...">
        <p>Выбери свою стихию:</p>
        <button class="btn" onclick="setElement('🔥 Огонь', 'https://icons8.com')">🔥 СТИХИЯ ОГНЯ</button>
        <button class="btn" onclick="setElement('💧 Вода', 'https://icons8.com')">💧 СТИХИЯ ВОДЫ</button>
        <button id="start-btn" class="btn btn-main" style="display:none;" onclick="saveCharacter()">ПРОБУДИТЬ СИЛУ</button>
    </div>

    <!-- ЭКРАН 2: МЕНЮ -->
    <div id="screen-menu" class="screen">
        <h2 id="stat-name">---</h2>
        <img id="hero-avatar" src="" class="hero-img">
        <p>Золото: <span id="stat-gold">0</span> 💰</p>
        <button class="btn btn-main" onclick="alert('Битва скоро появится!')">⚔️ В БОЙ</button>
        <button class="btn" onclick="tg.close()">ВЫХОД</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let player = { name: "", element: "", avatar: "", gold: 100 };

        function showScreen(id) {
            // Скрываем все
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            // Показываем нужный
            const target = document.getElementById(id);
            if (target) target.classList.add('active');
        }

        function setElement(el, img) {
            player.element = el;
            player.avatar = img;
            document.getElementById('start-btn').style.display = 'block';
        }

        function saveCharacter() {
            const nameInput = document.getElementById('p-name-input').value;
            player.name = nameInput || "Шиноби";
            localStorage.setItem('anime_rpg_v3', JSON.stringify(player));
            updateUI();
            showScreen('screen-menu');
        }

        function updateUI() {
            document.getElementById('stat-name').innerText = player.name + " (" + player.element + ")";
            document.getElementById('stat-gold').innerText = player.gold;
            document.getElementById('hero-avatar').src = player.avatar;
        }

        // Логика запуска
        window.onload = () => {
            const saved = localStorage.getItem('anime_rpg_v3');
            if (saved) {
                player = JSON.parse(saved);
                updateUI();
                showScreen('screen-menu');
            } else {
                showScreen('screen-create');
            }
        };
    </script>
</body>
</html>
