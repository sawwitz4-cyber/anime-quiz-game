<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org"></script>
    <!-- Инструмент отладки (появится шестеренка внизу) -->
    <script src="https://jsdelivr.net"></script>
    <script>eruda.init();</script>
    
    <style>
        body { background: #000 !important; color: #0f0; font-family: monospace; padding: 20px; text-align: center; }
        .test-btn { background: #222; color: #0f0; border: 1px solid #0f0; padding: 20px; width: 100%; margin-top: 50px; }
    </style>
</head>
<body>
    <h2 id="status">ПРОВЕРКА ЗАПУСКА...</h2>
    <div id="debug-info"></div>
    <button class="test-btn" onclick="location.reload(true)">ОБНОВИТЬ КЕШ (FORCE)</button>

    <script>
        try {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            
            document.getElementById('status').innerText = "ТЕЛЕГРАМ ПОДКЛЮЧЕН!";
            document.getElementById('debug-info').innerHTML = "User: " + (tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "не найден");
        } catch (e) {
            document.getElementById('status').innerText = "ОШИБКА: " + e.message;
        }
    </script>
</body>
</html>
