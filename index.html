<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org"></script>
    <style>
        body { background: #0d0d12; color: #f4e4bc; font-family: sans-serif; text-align: center; padding: 20px; }
        .btn { display: block; background: #2b1d0e; border: 1px solid #d4af37; color: #d4af37; padding: 15px; margin: 10px auto; width: 80%; border-radius: 10px; text-decoration: none; font-weight: bold; }
        .stats { background: #1a1a24; padding: 15px; border-radius: 15px; border: 1px solid #444; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h2>⛩️ ГЛАВНОЕ МЕНЮ</h2>
    <div class="stats">
        <p id="m-name">Загрузка...</p>
        <p>💰 Золото: <span id="m-gold">0</span> | 💎 Алмазы: <span id="m-dia">0</span></p>
    </div>

    <!-- Внутри index.html замени старые кнопки на эти -->
<a href="battle.html" class="btn" style="background: #800; color: white; border: none;">⚔️ ВСТУПИТЬ В БОЙ</a>
<a href="shop.html" class="btn">🛒 МАГАЗИН</a>
<a href="profile.html" class="btn">👤 ПЕРСОНАЖ И СУМКА</a>

    
    <button onclick="reset()" style="margin-top: 50px; opacity: 0.3; background: none; border: none; color: white;">Сброс (бесплатно для теста)</button>

    <script>
        let p = JSON.parse(localStorage.getItem('rpg_data'));
        
        // Если игрока нет — на создание
        if (!p) { window.location.href = 'create.html'; }
        else {
            document.getElementById('m-name').innerText = "Герой: " + p.name;
            document.getElementById('m-gold').innerText = p.gold;
            document.getElementById('m-dia').innerText = p.dia;
        }

        function reset() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
