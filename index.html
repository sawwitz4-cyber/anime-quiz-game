<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- ИСПРАВЛЕННАЯ ССЫЛКА НА СКРИПТ -->
    <script src="https://telegram.org"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0d0d12; --energy: #00ffcc; --red: #ff4d4d; }
        body { background: var(--bg); color: #f4e4bc; font-family: sans-serif; margin: 0; padding: 0; text-align: center; user-select: none; }
        .screen { display: none; padding: 15px; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .active { display: flex; }
        .stats-bar { display: flex; justify-content: space-around; background: #111; padding: 10px; border-bottom: 2px solid var(--gold); font-weight: bold; font-size: 14px; width: 100%; position: fixed; top: 0; z-index: 10; }
        .container { padding-top: 60px; width: 100%; }
        .glass-card { background: #1a1a24; border: 2px solid var(--gold); border-radius: 15px; padding: 15px; text-align: left; line-height: 1.4; margin-bottom: 15px; width: 90%; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        #dice { width: 60px; height: 60px; background: #880808; color: white; display: flex; align-items: center; justify-content: center; margin: 10px auto; font-size: 24px; font-weight: bold; border-radius: 12px; border: 2px solid var(--gold); }
        .btn-opt { background: #2b1d0e; border: 1px solid var(--gold); color: var(--gold); padding: 14px; width: 90%; border-radius: 12px; font-size: 14px; margin-bottom: 10px; cursor: pointer; font-weight: bold; }
        .btn-opt:active { background: var(--gold); color: #000; }
        .hp-bar { width: 100%; height: 10px; background: #333; border-radius: 5px; margin: 5px 0; overflow: hidden; }
        .hp-fill { height: 100%; background: var(--red); transition: width 0.3s; }
        .roll-anim { animation: shake 0.3s infinite; }
        @keyframes shake { 0% {transform: rotate(5deg)} 50% {transform: rotate(-5deg)} 100% {transform: rotate(5deg)} }
        .inv-item { font-size: 12px; background: rgba(255,255,255,0.1); padding: 5px; margin: 3px; border-radius: 5px; display: inline-block; }
    </style>
</head>
<body>

    <div class="stats-bar">
        <span>❤️ <span id="stat-hp">100</span></span>
        <span style="color:var(--energy)">⚡ <span id="stat-nrg">10</span></span>
        <span style="color:var(--gold)">💰 <span id="stat-gold">50</span></span>
    </div>

    <div id="scr-class" class="screen active">
        <div class="container">
            <h2>ВЫБЕРИ КЛАСС</h2>
            <button class="btn-opt" onclick="pickClass('paladin')">🛡️ ПАЛАДИН (150 HP)</button>
            <button class="btn-opt" onclick="pickClass('mage')">🔮 МАГ (80 HP)</button>
            <button class="btn-opt" onclick="pickClass('assassin')">🗡️ УБИЙЦА (100 HP)</button>
        </div>
    </div>

    <div id="scr-menu" class="screen">
        <div class="container">
            <h3 id="hero-title">Герой</h3>
            <div class="glass-card">
                <b>Инвентарь:</b>
                <div id="inv-list">Пусто</div>
            </div>
            <button class="btn-opt" style="background: #880808; color: white;" onclick="startBoss()">👹 БИТВА С ОРОЧИМАРУ</button>
            <button class="btn-opt" onclick="showScreen('scr-shop')">🛒 МАГАЗИН</button>
        </div>
    </div>

    <div id="scr-shop" class="screen">
        <div class="container">
            <h2>МАГАЗИН</h2>
            <button class="btn-opt" onclick="buyItem('Меч', 30, 5, 0)">🗡️ Стальной Меч (30г) [+5 урона]</button>
            <button class="btn-opt" onclick="buyItem('Доспех', 40, 0, 20)">🛡️ Доспех (40г) [+20 HP]</button>
            <button class="btn-opt" style="opacity:0.6" onclick="showScreen('scr-menu')">НАЗАД</button>
        </div>
    </div>

    <div id="scr-battle" class="screen">
        <div class="container">
            <div class="glass-card">
                <div style="display:flex; justify-content: space-between;"><b>ОРОЧИМАРУ</b> <span id="boss-hp-txt">100/100</span></div>
                <div class="hp-bar"><div id="boss-hp-fill" class="hp-fill" style="width: 100%;"></div></div>
                <div id="boss-talk" style="font-style: italic; color: #aaa; font-size: 13px;">"Хм... еще один смертный?"</div>
            </div>
            <div id="dice">d20</div>
            <div id="battle-log" style="font-size: 14px; margin-bottom: 10px;">Твой ход!</div>
            <button class="btn-opt" onclick="hit()">⚔️ АТАКОВАТЬ</button>
            <button class="btn-opt" style="background:none;" onclick="showScreen('scr-menu')">🏳️ СБЕЖАТЬ</button>
        </div>
    </div>

    <script>
        // 1. Инициализация переменных В ПЕРВУЮ ОЧЕРЕДЬ
        let player = { hp: 100, maxHp: 100, gold: 50, nrg: 10, dmg: 10, class: '', inv: [], title: '' };
        let boss = { hp: 100, maxHp: 100 };
        const insults = ["Твой кунай затупился!", "Даже Саске бил сильнее.", "Это всё, на что ты способен?"];

        // 2. Безопасная работа с Telegram
        const tg = window.Telegram ? window.Telegram.WebApp : null;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
            updateUI();
        }

        function updateUI() {
            document.getElementById('stat-hp').innerText = player.hp;
            document.getElementById('stat-nrg').innerText = player.nrg;
            document.getElementById('stat-gold').innerText = player.gold;
            document.getElementById('inv-list').innerHTML = player.inv.length ? player.inv.join(', ') : 'Пусто';
        }

        function pickClass(c) {
            if(c === 'paladin') { player.hp = player.maxHp = 150; player.dmg = 10; player.title = '🛡️ Паладин'; }
            else if(c === 'mage') { player.hp = player.maxHp = 80; player.dmg = 25; player.title = '🔮 Маг'; }
            else { player.hp = player.maxHp = 100; player.dmg = 15; player.title = '🗡️ Убийца'; }
            
            document.getElementById('hero-title').innerText = player.title;
            showScreen('scr-menu');
        }

        function buyItem(name, price, dmg, hp) {
            if(player.gold >= price) {
                player.gold -= price;
                player.inv.push(name);
                player.dmg += dmg;
                player.maxHp += hp;
                player.hp += hp;
                alert("Куплено!");
                updateUI();
            } else {
                alert("Нет золота!");
            }
        }

        function startBoss() {
            boss.hp = boss.maxHp;
            document.getElementById('boss-hp-txt').innerText = boss.hp + "/100";
            document.getElementById('boss-hp-fill').style.width = "100%";
            showScreen('scr-battle');
        }

        function hit() {
            const d = document.getElementById('dice');
            d.classList.add('roll-anim');
            
            setTimeout(() => {
                d.classList.remove('roll-anim');
                const roll = Math.floor(Math.random() * 20) + 1;
                d.innerText = roll;

                let damage = Math.floor(player.dmg * (roll / 10));
                if(roll === 20) damage *= 2;
                boss.hp = Math.max(0, boss.hp - damage);
                
                document.getElementById('battle-log').innerText = "Ты нанес " + damage + " урона!";

                if(boss.hp > 0) {
                    let bDmg = 10;
                    player.hp -= bDmg;
                    document.getElementById('boss-talk').innerText = insults[Math.floor(Math.random()*insults.length)];
                } else {
                    player.gold += 100;
                    alert("Победа! +100 золота");
                    showScreen('scr-menu');
                }
                
                updateUI();
                document.getElementById('boss-hp-txt').innerText = boss.hp + "/100";
                document.getElementById('boss-hp-fill').style.width = boss.hp + "%";
                
                if(player.hp <= 0) {
                    alert("Ты погиб...");
                    location.reload();
                }
            }, 500);
        }

        // Изначально показываем экран выбора класса
        document.getElementById('scr-class').style.display = 'flex';
    </script>
</body>
</html>
