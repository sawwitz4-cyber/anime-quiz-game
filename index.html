<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anime RPG: Initiative</title>
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0d0d12; --hp: #ff4d4d; --mana: #0099ff; --neon: #00ffcc; }
        body { background: var(--bg); color: #f4e4bc; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; text-align: center; user-select: none; overflow: hidden; }
        
        /* Вспышки */
        #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; opacity: 0; transition: opacity 0.1s; }
        
        .screen { display: none; padding: 15px; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .active { display: flex; }

        /* Панель статов */
        .stats-bar { display: flex; justify-content: space-around; background: #111; padding: 10px; border-bottom: 2px solid var(--gold); font-weight: bold; font-size: 12px; width: 100%; position: fixed; top: 0; z-index: 10; }
        .container { padding-top: 50px; width: 100%; }

        .glass-card { background: #1a1a24; border: 2px solid var(--gold); border-radius: 12px; padding: 15px; width: 90%; margin-bottom: 15px; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        
        /* Кубик */
        #dice { width: 60px; height: 60px; background: #880808; color: white; display: flex; align-items: center; justify-content: center; margin: 15px auto; font-size: 24px; font-weight: bold; border-radius: 12px; border: 2px solid var(--gold); box-shadow: 0 0 10px rgba(212,175,55,0.3); }
        .roll-anim { animation: shake 0.2s infinite; }
        @keyframes shake { 0% {transform: rotate(5deg)} 50% {transform: rotate(-5deg)} 100% {transform: rotate(5deg)} }

        /* Кнопки */
        .btn { background: #2b1d0e; border: 1px solid var(--gold); color: var(--gold); padding: 14px; width: 90%; border-radius: 10px; font-size: 14px; margin-bottom: 10px; cursor: pointer; font-weight: bold; }
        .btn:active { background: var(--gold); color: #000; }
        .btn:disabled { opacity: 0.3; }

        /* Полоски */
        .bar { width: 100%; height: 10px; background: #333; border-radius: 5px; overflow: hidden; margin: 5px 0; }
        .fill { height: 100%; transition: width 0.3s ease; }
        .mana-bar { width: 100%; height: 6px; background: #222; border-radius: 3px; overflow: hidden; margin-top: 4px; }

        .log { font-size: 14px; min-height: 45px; color: var(--neon); margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="flash"></div>

    <div class="stats-bar">
        <span>LVL: <span id="st-lvl">1</span></span>
        <span>❤️ <span id="st-hp">100</span></span>
        <span>💰 <span id="st-gold">50</span></span>
        <span>XP: <span id="st-xp">0</span>/100</span>
    </div>

    <!-- 1. ВЫБОР КЛАССА -->
    <div id="scr-class" class="screen active">
        <div class="container">
            <h2>ВЫБЕРИ СВОЙ КЛАСС</h2>
            <button class="btn" onclick="pickJob('paladin')">🛡️ ПАЛАДИН (Много HP, Защита)</button>
            <button class="btn" onclick="pickJob('mage')">🔮 МАГ (Сила, Мана)</button>
            <button class="btn" onclick="pickJob('assassin')">🗡️ УБИЙЦА (Скорость, Крит)</button>
        </div>
    </div>

    <!-- 2. МЕНЮ -->
    <div id="scr-menu" class="screen">
        <div class="container">
            <h3 id="hero-title">Герой</h3>
            <div class="glass-card" style="text-align: left; font-size: 13px;">
                💪 Сила: <b id="stat-str">10</b><br>
                🛡️ Защита: <b id="stat-def">5</b><br>
                ⚡ Скорость: <b id="stat-spd">10</b>
            </div>
            <button class="btn" style="background:#880808; color:white; border:none;" onclick="startBattle()">👹 ВСТУПИТЬ В БОЙ</button>
            <button class="btn" onclick="alert('Магазин в разработке')">🛒 МАГАЗИН</button>
            <button class="btn" style="opacity:0.5; border:none; font-size:10px;" onclick="location.reload()">СБРОС ПЕРСОНАЖА</button>
        </div>
    </div>

    <!-- 3. БИТВА -->
    <div id="scr-battle" class="screen">
        <div class="container">
            <div class="glass-card">
                <div style="display:flex; justify-content:space-between; font-size:12px;"><b>ОРОЧИМАРУ</b> <span id="b-hp-txt">200/200</span></div>
                <div class="bar"><div id="b-hp-fill" class="fill" style="background:var(--hp); width:100%"></div></div>
                <div id="b-talk" style="font-size:11px; color:#888; font-style:italic;">"Твой конец близок..."</div>
            </div>

            <div id="dice">d20</div>
            <div id="battle-log" class="log">Бросьте на инициативу!</div>

            <!-- Статы игрока в бою -->
            <div style="font-size:12px; margin-bottom:5px;" id="p-hp-mana">❤️ 100 | 💧 0</div>
            <div class="bar"><div id="p-hp-fill" class="fill" style="background:var(--neon); width:100%"></div></div>
            <div class="mana-bar"><div id="p-mana-fill" class="fill" style="background:var(--mana); width:0%"></div></div>

            <div id="battle-btns" style="margin-top:20px; width:100%;">
                <button id="btn-init" class="btn" style="border-color:var(--neon)" onclick="rollInitiative()">🎲 БРОСОК НА ХОД</button>
                <button id="btn-hit" class="btn" style="display:none;" onclick="playerHit()">⚔️ УДАРИТЬ</button>
                <button id="btn-skill" class="btn" style="display:none; background:#003366; color:white;" onclick="useSkill()">✨ СПОСОБНОСТЬ</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        let p = { lvl:1, xp:0, gold:50, hp:100, maxHp:100, str:12, def:8, spd:10, mana:0, maxMana:50, job:'', skillName:'' };
        let b = { hp:200, maxHp:200, str:22, spd:8 };

        function show(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function pickJob(job) {
            p.job = job;
            if(job === 'paladin') { p.maxHp=150; p.str=12; p.def=15; p.spd=7; p.skillName="✨ ИСЦЕЛЕНИЕ"; }
            if(job === 'mage') { p.maxHp=85; p.str=24; p.def=4; p.spd=11; p.skillName="🔥 ФАЕРБОЛ"; }
            if(job === 'assassin') { p.maxHp=110; p.str=18; p.def=6; p.spd=15; p.skillName="🐍 ЯД"; }
            p.hp = p.maxHp;
            document.getElementById('hero-title').innerText = job.toUpperCase();
            updateUI();
            show('scr-menu');
        }

        function updateUI() {
            document.getElementById('st-lvl').innerText = p.lvl;
            document.getElementById('st-hp').innerText = p.hp;
            document.getElementById('st-gold').innerText = p.gold;
            document.getElementById('st-xp').innerText = p.xp;
            document.getElementById('stat-str').innerText = p.str;
            document.getElementById('stat-def').innerText = p.def;
            document.getElementById('stat-spd').innerText = p.spd;
        }

        function startBattle() {
            b.hp = b.maxHp;
            p.hp = p.maxHp;
            p.mana = 0;
            updateBattleUI();
            resetBattleBtns();
            show('scr-battle');
        }

        function resetBattleBtns() {
            document.getElementById('btn-init').style.display = 'block';
            document.getElementById('btn-hit').style.display = 'none';
            document.getElementById('btn-skill').style.display = 'none';
            document.getElementById('battle-log').innerText = "Бросьте на инициативу!";
            document.getElementById('dice').innerText = "d20";
        }

        async function rollInitiative() {
            const d = document.getElementById('dice');
            d.classList.add('roll-anim');
            await new Promise(r => setTimeout(r, 600));
            d.classList.remove('roll-anim');

            let pRoll = Math.floor(Math.random()*20)+1;
            let bRoll = Math.floor(Math.random()*20)+1;
            d.innerText = pRoll;

            if((pRoll + p.spd) >= (bRoll + b.spd)) {
                document.getElementById('battle-log').innerText = "Твой ход! Ты быстрее босса.";
                document.getElementById('btn-init').style.display = 'none';
                document.getElementById('btn-hit').style.display = 'block';
                document.getElementById('btn-skill').style.display = 'block';
                document.getElementById('btn-skill').disabled = p.mana < 30;
            } else {
                document.getElementById('battle-log').innerText = "Босс атакует первым!";
                setTimeout(bossHit, 1000);
            }
        }

        async function playerHit() {
            const d = document.getElementById('dice');
            d.classList.add('roll-anim');
            await new Promise(r => setTimeout(r, 600));
            d.classList.remove('roll-anim');

            let roll = Math.floor(Math.random()*20)+1;
            d.innerText = roll;

            if(roll >= 8) {
                let dmg = Math.floor(p.str * (roll === 20 ? 2 : 1));
                b.hp = Math.max(0, b.hp - dmg);
                p.mana = Math.min(p.maxMana, p.mana + 15);
                document.getElementById('battle-log').innerText = `Удар! Нанесено ${dmg} урона.`;
            } else {
                document.getElementById('battle-log').innerText = "Промах!";
            }
            checkStatus();
        }

        function useSkill() {
            p.mana -= 30;
            let log = "";
            if(p.job === 'mage') { b.hp -= 80; flash('red'); log = "🔥 ФАЕРБОЛ! Огромный урон!"; }
            if(p.job === 'paladin') { p.hp = Math.min(p.maxHp, p.hp + 60); flash('lime'); log = "✨ ИСЦЕЛЕНИЕ! +60 HP"; }
            if(p.job === 'assassin') { b.hp -= 50; b.str = Math.max(10, b.str - 5); flash('purple'); log = "🐍 ЯД! Урон и ослабление."; }
            
            document.getElementById('battle-log').innerText = log;
            checkStatus();
        }

        function bossHit() {
            let dmg = Math.max(5, b.str - Math.floor(p.def/2));
            p.hp = Math.max(0, p.hp - dmg);
            flash('rgba(255,0,0,0.4)');
            document.getElementById('battle-log').innerText = `👹 Босс бьет на ${dmg} урона!`;
            
            if(p.hp <= 0) { alert("Вы погибли..."); location.reload(); }
            else { updateBattleUI(); setTimeout(resetBattleBtns, 1500); }
        }

        function checkStatus() {
            updateBattleUI();
            if(b.hp <= 0) {
                alert("Победа! Вы получили 50 золота и 60 опыта.");
                p.gold += 50; p.xp += 60;
                if(p.xp >= 100) { p.lvl++; p.xp=0; p.str+=3; p.maxHp+=15; alert("НОВЫЙ УРОВЕНЬ: " + p.lvl); }
                show('scr-menu');
            } else {
                setTimeout(resetBattleBtns, 1500);
            }
        }

        function flash(c) {
            const f = document.getElementById('flash');
            f.style.backgroundColor = c; f.style.opacity = '0.6';
            setTimeout(() => f.style.opacity = '0', 150);
        }

        function updateBattleUI() {
            document.getElementById('b-hp-txt').innerText = b.hp + "/" + b.maxHp;
            document.getElementById('b-hp-fill').style.width = (b.hp / b.maxHp * 100) + "%";
            document.getElementById('p-hp-fill').style.width = (p.hp / p.maxHp * 100) + "%";
            document.getElementById('p-mana-fill').style.width = (p.mana / p.maxMana * 100) + "%";
            document.getElementById('p-hp-mana').innerText = `❤️ ${p.hp} | 💧 ${p.mana}`;
            updateUI();
        }
    </script>
</body>
</html>
