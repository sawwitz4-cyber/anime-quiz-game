<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0d0d12; --hp: #ff4d4d; --init: #00ffcc; }
        body { background: var(--bg); color: #f4e4bc; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; text-align: center; user-select: none; overflow: hidden; }
        .screen { display: none; padding: 15px; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .active { display: flex; }
        
        /* Верхняя панель */
        .stats-bar { display: flex; justify-content: space-around; background: #111; padding: 10px; border-bottom: 2px solid var(--gold); font-weight: bold; font-size: 12px; width: 100%; position: fixed; top: 0; z-index: 10; }
        .container { padding-top: 50px; width: 100%; }

        /* Карточка персонажа */
        .glass-card { background: #1a1a24; border: 2px solid var(--gold); border-radius: 12px; padding: 12px; margin-bottom: 10px; width: 90%; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 12px; text-align: left; }

        /* Шкала инициативы (как в Героях 5) */
        .init-bar { position: fixed; bottom: 20px; left: 5%; width: 90%; height: 50px; background: rgba(0,0,0,0.8); border: 1px solid var(--gold); border-radius: 5px; display: flex; align-items: center; overflow: hidden; }
        .init-track { position: relative; width: 100%; height: 100%; }
        .init-icon { position: absolute; width: 40px; height: 40px; border: 1px solid white; border-radius: 3px; transition: left 0.5s linear; top: 4px; display: flex; align-items: center; justify-content: center; background: #222; font-size: 20px; }

        /* Кнопки */
        .btn-opt { background: #2b1d0e; border: 1px solid var(--gold); color: var(--gold); padding: 12px; width: 90%; border-radius: 10px; font-size: 14px; margin-bottom: 8px; cursor: pointer; font-weight: bold; }
        .btn-opt:disabled { opacity: 0.3; cursor: default; }

        .hp-bar { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
        .hp-fill { height: 100%; background: var(--hp); transition: width 0.3s; }
        #dice { width: 50px; height: 50px; background: #880808; color: white; display: flex; align-items: center; justify-content: center; margin: 10px auto; font-size: 20px; font-weight: bold; border-radius: 10px; border: 2px solid var(--gold); }
        .roll-anim { animation: shake 0.2s infinite; }
        @keyframes shake { 0% {transform: rotate(5deg)} 50% {transform: rotate(-5deg)} }
    </style>
</head>
<body>

    <div class="stats-bar">
        <span>LVL: <span id="st-lvl">1</span></span>
        <span>❤️ <span id="st-hp">100</span></span>
        <span>💰 <span id="st-gold">50</span></span>
        <span>XP: <span id="st-xp">0</span>/100</span>
    </div>

    <!-- ВЫБОР КЛАССА -->
    <div id="scr-class" class="screen active">
        <div class="container">
            <h2>ПУТЬ ГЕРОЯ</h2>
            <button class="btn-opt" onclick="pickClass('paladin')">🛡️ ПАЛАДИН (Защита + Сила)</button>
            <button class="btn-opt" onclick="pickClass('mage')">🔮 МАГ (Скорость + Сила)</button>
            <button class="btn-opt" onclick="pickClass('assassin')">🗡️ УБИЙЦА (Скорость + Крит)</button>
        </div>
    </div>

    <!-- МЕНЮ -->
    <div id="scr-menu" class="screen">
        <div class="container">
            <h3 id="hero-title">Герой</h3>
            <div class="glass-card stat-grid">
                <div>💪 Сила: <b id="stat-str">0</b></div>
                <div>🛡️ Защита: <b id="stat-def">0</b></div>
                <div>⚡ Скорость: <b id="stat-spd">0</b></div>
                <div>🎒 Вещей: <b id="stat-inv">0</b></div>
            </div>
            <button class="btn-opt" style="background:#880808; color:white" onclick="startBattle()">👹 В ПОДЗЕМЕЛЬЕ</button>
            <button class="btn-opt" onclick="showScreen('scr-shop')">🛒 МАГАЗИН</button>
        </div>
    </div>

    <!-- БИТВА -->
    <div id="scr-battle" class="screen">
        <div class="container">
            <div class="glass-card">
                <div style="display:flex; justify-content:space-between"><b>ОРОЧИМАРУ</b> <span id="b-hp-txt">100/100</span></div>
                <div class="hp-bar"><div id="b-hp-fill" class="hp-fill" style="width:100%"></div></div>
                <div id="b-talk" style="font-size:11px; color:#aaa; margin-top:5px">"Жалкое зрелище..."</div>
            </div>

            <div id="dice">d20</div>
            <div id="battle-log" style="font-size:13px; min-height:40px">Ожидание хода...</div>

            <button id="btn-hit" class="btn-opt" onclick="playerTurn()" disabled>⚔️ УДАРИТЬ</button>
        </div>

        <div class="init-bar">
            <div class="init-track">
                <div id="icon-p" class="init-icon" style="left:0">👤</div>
                <div id="icon-b" class="init-icon" style="left:0">👹</div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if(tg) { tg.ready(); tg.expand(); }

        let p = { lvl: 1, xp: 0, gold: 50, hp: 100, maxHp: 100, str: 10, def: 5, spd: 10, inv: [] };
        let b = { hp: 100, maxHp: 100, str: 12, spd: 8 };
        let pInit = 0, bInit = 0;
        let battleActive = false;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
            updateUI();
        }

        function pickClass(c) {
            if(c === 'paladin') { p.maxHp=150; p.str=12; p.def=10; p.spd=8; p.title="Паладин"; }
            if(c === 'mage') { p.maxHp=80; p.str=20; p.def=3; p.spd=12; p.title="Маг"; }
            if(c === 'assassin') { p.maxHp=100; p.str=15; p.def=5; p.spd=15; p.title="Убийца"; }
            p.hp = p.maxHp;
            document.getElementById('hero-title').innerText = p.title;
            showScreen('scr-menu');
        }

        function updateUI() {
            document.getElementById('st-lvl').innerText = p.lvl;
            document.getElementById('st-hp').innerText = p.hp;
            document.getElementById('st-gold').innerText = p.gold;
            document.getElementById('st-xp').innerText = p.xp;
            document.getElementById('stat-str').innerText = p.str;
            document.getElementById('stat-def').innerText = p.def;
            document.getElementById('stat-spd').innerText = p.spd;
            document.getElementById('stat-inv').innerText = p.inv.length;
        }

        function startBattle() {
            b.hp = 100; p.hp = p.maxHp;
            pInit = 0; bInit = 0;
            battleActive = true;
            showScreen('scr-battle');
            tickInit();
        }

        function tickInit() {
            if(!battleActive) return;
            
            pInit += p.spd * 0.5;
            bInit += b.spd * 0.5;

            document.getElementById('icon-p').style.left = Math.min(90, pInit) + "%";
            document.getElementById('icon-b').style.left = Math.min(90, bInit) + "%";

            if(pInit >= 90) {
                document.getElementById('btn-hit').disabled = false;
                document.getElementById('battle-log').innerText = "ТВОЙ ХОД!";
            } else if(bInit >= 90) {
                setTimeout(bossTurn, 500);
            } else {
                setTimeout(tickInit, 100);
            }
        }

        function playerTurn() {
            document.getElementById('btn-hit').disabled = true;
            const d = document.getElementById('dice');
            d.classList.add('roll-anim');
            
            setTimeout(() => {
                d.classList.remove('roll-anim');
                const roll = Math.floor(Math.random() * 20) + 1;
                d.innerText = roll;
                let dmg = Math.max(1, Math.floor(p.str * (roll/10)));
                b.hp = Math.max(0, b.hp - dmg);
                
                document.getElementById('battle-log').innerText = `Ты нанес ${dmg} урона!`;
                updateBattleUI();

                if(b.hp <= 0) {
                    win();
                } else {
                    pInit = 0;
                    tickInit();
                }
            }, 600);
        }

        function bossTurn() {
            let dmg = Math.max(1, b.str - Math.floor(p.def/2));
            p.hp = Math.max(0, p.hp - dmg);
            document.getElementById('battle-log').innerText = `Босс бьет на ${dmg} урона!`;
            updateBattleUI();

            if(p.hp <= 0) {
                alert("Ты проиграл...");
                location.reload();
            } else {
                bInit = 0;
                tickInit();
            }
        }

        function updateBattleUI() {
            document.getElementById('b-hp-txt').innerText = b.hp + "/100";
            document.getElementById('b-hp-fill').style.width = b.hp + "%";
            updateUI();
        }

        function win() {
            battleActive = false;
            p.gold += 50;
            p.xp += 60;
            if(p.xp >= 100) {
                p.lvl++; p.xp = 0; p.str += 2; p.maxHp += 10;
                alert("LEVEL UP! Уровень " + p.lvl);
            } else {
                alert("Победа! +50 золота");
            }
            showScreen('scr-menu');
        }
    </script>
</body>
</html>
