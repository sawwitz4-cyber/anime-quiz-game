<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPG Battle</title>
    <!-- ПРЯМАЯ ССЫЛКА НА СКРИПТ -->
    <script src="https://telegram.org"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0d0d12; --hp: #ff4d4d; --mana: #0099ff; --neon: #00ffcc; }
        body { background: var(--bg); color: #f4e4bc; font-family: sans-serif; margin: 0; padding: 0; text-align: center; user-select: none; overflow-x: hidden; }
        #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; opacity: 0; transition: opacity 0.1s; }
        .screen { display: none; padding: 15px; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .active { display: flex !important; }
        .stats-bar { display: flex; justify-content: space-around; background: #111; padding: 10px; border-bottom: 2px solid var(--gold); font-weight: bold; font-size: 12px; width: 100%; position: sticky; top: 0; z-index: 10; }
        .container { padding-top: 20px; width: 100%; }
        .glass-card { background: #1a1a24; border: 2px solid var(--gold); border-radius: 12px; padding: 15px; width: 90%; margin-bottom: 15px; }
        #dice { width: 60px; height: 60px; background: #880808; color: white; display: flex; align-items: center; justify-content: center; margin: 15px auto; font-size: 24px; font-weight: bold; border-radius: 12px; border: 2px solid var(--gold); }
        .btn { background: #2b1d0e; border: 1px solid var(--gold); color: var(--gold); padding: 14px; width: 90%; border-radius: 10px; font-size: 14px; margin-bottom: 10px; cursor: pointer; font-weight: bold; }
        .bar { width: 100%; height: 10px; background: #333; border-radius: 5px; overflow: hidden; margin: 5px 0; }
        .fill { height: 100%; transition: width 0.3s; }
        .roll-anim { animation: shake 0.2s infinite; }
        @keyframes shake { 0% {transform: rotate(5deg)} 50% {transform: rotate(-5deg)} }
    </style>
</head>
<body>
    <div id="flash"></div>

    <div class="stats-bar">
        <span>LVL: <span id="st-lvl">1</span></span>
        <span>❤️ <span id="st-hp">100</span></span>
        <span>💰 <span id="st-gold">50</span></span>
    </div>

    <!-- 1. ВЫБОР КЛАССА -->
    <div id="scr-class" class="screen active">
        <div class="container">
            <h2>ВЫБЕРИ КЛАСС</h2>
            <button class="btn" onclick="pickJob('paladin')">🛡️ ПАЛАДИН</button>
            <button class="btn" onclick="pickJob('mage')">🔮 МАГ</button>
            <button class="btn" onclick="pickJob('assassin')">🗡️ УБИЙЦА</button>
        </div>
    </div>

    <!-- 2. МЕНЮ -->
    <div id="scr-menu" class="screen">
        <div class="container">
            <h3 id="hero-title">Герой</h3>
            <div class="glass-card" style="text-align: left; font-size: 13px;">
                💪 Сила: <b id="stat-str">0</b> | 🛡️ Защита: <b id="stat-def">0</b><br>
                ⚡ Скорость: <b id="stat-spd">0</b> | XP: <span id="st-xp">0</span>/100
            </div>
            <button class="btn" style="background:#880808; color:white;" onclick="startBattle()">👹 ВСТУПИТЬ В БОЙ</button>
            <button class="btn" onclick="alert('Магазин пуст')">🛒 МАГАЗИН</button>
        </div>
    </div>

    <!-- 3. БИТВА -->
    <div id="scr-battle" class="screen">
        <div class="container">
            <div class="glass-card">
                <b>ОРОЧИМАРУ</b> <span id="b-hp-txt">200/200</span>
                <div class="bar"><div id="b-hp-fill" class="fill" style="background:var(--hp); width:100%"></div></div>
            </div>
            <div id="dice">d20</div>
            <div id="battle-log" style="font-size:14px; min-height:40px; margin: 10px 0;">Кидайте на инициативу!</div>
            <div id="p-hp-mana" style="font-size:12px;">❤️ 100 | 💧 0</div>
            <div class="bar"><div id="p-hp-fill" class="fill" style="background:var(--neon); width:100%"></div></div>
            <div class="bar" style="height:5px;"><div id="p-mana-fill" class="fill" style="background:var(--mana); width:0%"></div></div>
            <div id="battle-btns" style="margin-top:20px; width:100%;">
                <button id="btn-init" class="btn" onclick="rollInitiative()">🎲 БРОСОК НА ХОД</button>
                <button id="btn-hit" class="btn" style="display:none;" onclick="playerHit()">⚔️ УДАР</button>
                <button id="btn-skill" class="btn" style="display:none; background:#003366; color:white;" onclick="useSkill()">✨ НАВЫК</button>
            </div>
        </div>
    </div>

    <script>
        // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ (Объявлены сразу!)
        var p = { lvl:1, xp:0, gold:50, hp:100, maxHp:100, str:12, def:8, spd:10, mana:0, maxMana:50, job:'', skillName:'' };
        var b = { hp:200, maxHp:200, str:22, spd:8 };
        
        // Инициализация Telegram
        var tg = window.Telegram ? window.Telegram.WebApp : { ready: function(){}, expand: function(){} };
        tg.ready(); tg.expand();

        function show(id) {
            var screens = document.getElementsByClassName('screen');
            for(var i=0; i<screens.length; i++) screens[i].classList.remove('active');
            document.getElementById(id).classList.add('active');
        }

        function pickJob(job) {
            p.job = job;
            if(job === 'paladin') { p.maxHp=150; p.str=12; p.def=15; p.spd=7; p.skillName="ИСЦЕЛЕНИЕ"; }
            if(job === 'mage') { p.maxHp=85; p.str=24; p.def=4; p.spd=11; p.skillName="ФАЕРБОЛ"; }
            if(job === 'assassin') { p.maxHp=110; p.str=18; p.def=6; p.spd=15; p.skillName="ЯД"; }
            p.hp = p.maxHp;
            document.getElementById('hero-title').innerText = job.toUpperCase();
            updateUI();
            show('scr-menu');
        }

        function updateUI() {
            document.getElementById('st-lvl').innerText = p.lvl;
            document.getElementById('st-hp').innerText = p.hp;
            document.getElementById('st-gold').innerText = p.gold;
            document.getElementById('st-xp').innerText = p.xp;
            document.getElementById('stat-str').innerText = p.str;
            document.getElementById('stat-def').innerText = p.def;
            document.getElementById('stat-spd').innerText = p.spd;
        }

        function startBattle() {
            b.hp = 200; p.hp = p.maxHp; p.mana = 0;
            updateBattleUI();
            resetBattleBtns();
            show('scr-battle');
        }

        function resetBattleBtns() {
            document.getElementById('btn-init').style.display = 'block';
            document.getElementById('btn-hit').style.display = 'none';
            document.getElementById('btn-skill').style.display = 'none';
            document.getElementById('battle-log').innerText = "Кидайте на инициативу!";
            document.getElementById('dice').innerText = "d20";
        }

        function rollInitiative() {
            var d = document.getElementById('dice');
            d.classList.add('roll-anim');
            setTimeout(function(){
                d.classList.remove('roll-anim');
                var pRoll = Math.floor(Math.random()*20)+1;
                var bRoll = Math.floor(Math.random()*20)+1;
                d.innerText = pRoll;
                if((pRoll + p.spd) >= (bRoll + b.spd)) {
                    document.getElementById('battle-log').innerText = "Твой ход!";
                    document.getElementById('btn-init').style.display = 'none';
                    document.getElementById('btn-hit').style.display = 'block';
                    document.getElementById('btn-skill').style.display = 'block';
                    document.getElementById('btn-skill').disabled = (p.mana < 30);
                } else {
                    document.getElementById('battle-log').innerText = "Босс атакует!";
                    setTimeout(bossHit, 800);
                }
            }, 600);
        }

        function playerHit() {
            var d = document.getElementById('dice');
            d.classList.add('roll-anim');
            setTimeout(function(){
                d.classList.remove('roll-anim');
                var roll = Math.floor(Math.random()*20)+1;
                d.innerText = roll;
                if(roll >= 8) {
                    var dmg = Math.floor(p.str * (roll === 20 ? 2 : 1));
                    b.hp = Math.max(0, b.hp - dmg);
                    p.mana = Math.min(p.maxMana, p.mana + 15);
                    document.getElementById('battle-log').innerText = "Удар на " + dmg + "!";
                } else {
                    document.getElementById('battle-log').innerText = "Промах!";
                }
                checkStatus();
            }, 600);
        }

        function useSkill() {
            p.mana -= 30;
            if(p.job === 'mage') { b.hp -= 80; triggerFlash('red'); }
            if(p.job === 'paladin') { p.hp = Math.min(p.maxHp, p.hp + 60); triggerFlash('lime'); }
            if(p.job === 'assassin') { b.hp -= 50; b.str -= 5; triggerFlash('purple'); }
            document.getElementById('battle-log').innerText = "Использован навык " + p.skillName;
            checkStatus();
        }

        function bossHit() {
            var dmg = Math.max(5, b.str - Math.floor(p.def/2));
            p.hp = Math.max(0, p.hp - dmg);
            triggerFlash('rgba(255,0,0,0.3)');
            document.getElementById('battle-log').innerText = "Босс нанес " + dmg + " урона!";
            if(p.hp <= 0) { alert("Поражение!"); location.reload(); }
            else { updateBattleUI(); setTimeout(resetBattleBtns, 1000); }
        }

        function checkStatus() {
            updateBattleUI();
            if(b.hp <= 0) {
                alert("Победа!"); p.gold += 50; p.xp += 60;
                if(p.xp >= 100) { p.lvl++; p.xp=0; p.str+=2; alert("Уровень повышен!"); }
                show('scr-menu');
            } else { setTimeout(resetBattleBtns, 1000); }
        }

        function triggerFlash(c) {
            var f = document.getElementById('flash');
            f.style.backgroundColor = c; f.style.opacity = '0.5';
            setTimeout(function(){ f.style.opacity = '0'; }, 150);
        }

        function updateBattleUI() {
            document.getElementById('b-hp-txt').innerText = b.hp + "/200";
            document.getElementById('b-hp-fill').style.width = (b.hp/200*100) + "%";
            document.getElementById('p-hp-fill').style.width = (p.hp/p.maxHp*100) + "%";
            document.getElementById('p-mana-fill').style.width = (p.mana/p.maxMana*100) + "%";
            document.getElementById('p-hp-mana').innerText = "❤️ " + p.hp + " | 💧 " + p.mana;
            updateUI();
        }
    </script>
</body>
</html>
