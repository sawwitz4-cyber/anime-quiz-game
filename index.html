<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Battle</title>
    <script src="https://telegram.org"></script>
    <style>
        /* Яркий фон, чтобы сразу понять, что файл загрузился */
        body { background: #1a1a2e; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .boss-hp { color: #ff4d4d; font-size: 24px; font-weight: bold; }
        #question { background: #16213e; padding: 20px; border-radius: 15px; border: 1px solid #00ffcc; margin: 20px 0; }
        #slots { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; min-height: 40px; }
        .slot { width: 30px; height: 35px; border-bottom: 2px solid #00ffcc; font-size: 24px; }
        #letters { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { background: #0f3460; border: 1px solid #00ffcc; color: white; padding: 15px 0; border-radius: 10px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="boss-hp">БОСС: <span id="hp">100</span> HP</div>
        <div id="question">ЗАГРУЗКА...</div>
        <div id="slots"></div>
        <div id="letters"></div>
    </div>

    <script>
        // Запускаем всё ТОЛЬКО после полной загрузки страницы
        window.addEventListener('load', function() {
            try {
                const tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();

                const questions = [
                    {q: "Имя девятихвостого лиса?", a: "КУРАМА"},
                    {q: "Кто носит соломенную шляпу?", a: "ЛУФФИ"}
                ];
                let cur = 0, input = "", hp = 100;

                function render() {
                    const q = questions[cur];
                    document.getElementById('question').innerText = q.q;
                    document.getElementById('hp').innerText = hp;
                    const s = document.getElementById('slots');
                    s.innerHTML = "";
                    for(let i=0; i<q.a.length; i++) s.innerHTML += `<div class="slot" id="s${i}"></div>`;
                    
                    const g = document.getElementById('letters');
                    g.innerHTML = "";
                    let chars = (q.a + "АБВГ").split('').sort(() => Math.random() - 0.5);
                    chars.forEach(c => {
                        let b = document.createElement('button');
                        b.innerText = c;
                        b.onclick = function() {
                            if(input.length < q.a.length) {
                                document.getElementById('s'+input.length).innerText = c;
                                input += c;
                                this.style.opacity = "0.3";
                                this.disabled = true;
                                if(input.length == q.a.length) {
                                    if(input == q.a) {
                                        hp -= 50;
                                        if(hp <= 0) { alert("ПОБЕДА!"); location.reload(); }
                                        else { cur++; input = ""; render(); }
                                    } else {
                                        tg.HapticFeedback.notificationOccurred('error');
                                        alert("ОШИБКА!");
                                        input = ""; render();
                                    }
                                }
                            }
                        };
                        g.appendChild(b);
                    });
                }
                render();
            } catch (e) {
                document.body.innerHTML = "<h1>ОШИБКА JS: " + e.message + "</h1>";
            }
        });
    </script>
</body>
</html>
