<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shinobi Tavern</title>
    
    <!-- 1. ИСПРАВЛЕННЫЕ ССЫЛКИ (БЕЗ ОШИБОК MIME) -->
    <script src="https://telegram.org"></script>
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>

    <style>
        :root { --gold: #d4af37; --bg: #0d0d12; --card: #1a1a24; --accent: #00ffcc; }
        body { background: var(--bg); color: #f4e4bc; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .top-info { width: 100%; padding: 20px; background: linear-gradient(180deg, rgba(212, 175, 55, 0.1) 0%, rgba(0,0,0,0) 100%); text-align: center; box-sizing: border-box; }
        .profile-card { background: var(--card); border: 2px solid var(--gold); border-radius: 25px; padding: 20px; width: 85%; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); box-sizing: border-box; }
        .stat-row { display: flex; justify-content: space-between; margin: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 3px; font-size: 14px; }
        .main-btn { background: linear-gradient(135deg, #800 0%, #c00 100%); color: white; border: none; padding: 16px; width: 85%; border-radius: 15px; font-size: 18px; font-weight: bold; text-transform: uppercase; text-decoration: none; display: block; text-align: center; margin-bottom: 12px; }
        .sub-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 85%; margin-bottom: 20px; }
        .side-btn { background: var(--card); border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; text-decoration: none; font-size: 12px; font-weight: bold; text-align: center; }
        .chat-box { width: 85%; background: var(--card); border: 1px solid #333; border-radius: 20px; padding: 15px; box-sizing: border-box; margin-bottom: 20px; }
        .chat-messages { height: 120px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; text-align: left; }
        .msg { font-size: 12px; background: rgba(255,255,255,0.03); padding: 6px 10px; border-radius: 10px; }
        .msg b { color: var(--gold); }
        .chat-input-area { display: flex; gap: 8px; }
        .chat-input { flex: 1; background: #000; border: 1px solid #444; color: white; padding: 10px; border-radius: 10px; font-size: 13px; outline: none; }
        .chat-send { background: var(--gold); border: none; padding: 0 15px; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; }
    </style>
</head>
<body>

    <div class="top-info">
        <h1 id="hero-name" style="margin:0; font-size: 24px;">Шиноби</h1>
        <div style="color:var(--gold); font-size: 12px; margin-top:5px;">Рекорд: <span id="max-floor">1</span> этаж</div>
    </div>

    <div class="profile-card">
        <div class="stat-row"><span>💰 Золото:</span> <b id="hero-gold">0</b></div>
        <div class="stat-row"><span>⚡ Энергия:</span> <b id="hero-nrg" style="color:var(--accent)">0/10</b></div>
        <div class="stat-row"><span>❤️ HP:</span> <b id="hero-hp">0/0</b></div>
    </div>

    <a href="map.html" class="main-btn">В ПУТЬ 🗺️</a>

    <div class="sub-btns">
        <a href="shop.html" class="side-btn">🛒 МАГАЗИН</a>
        <a href="profile.html" class="side-btn">🎒 СУМКА</a>
    </div>

    <div class="chat-box">
        <div id="chat-msgs" class="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-in" class="chat-input" placeholder="Чат...">
            <button class="chat-send" onclick="sendMsg()">></button>
        </div>
    </div>

    <script>
        // 2. ДАННЫЕ ИГРОКА
        var p = JSON.parse(localStorage.getItem('rpg_data')) || {};
        var chatRef;

        // 3. ФУНКЦИЯ ОТПРАВКИ (ГЛОБАЛЬНО)
        window.sendMsg = function() {
            var input = document.getElementById('chat-in');
            if (!input || !chatRef) return;
            var text = input.value.trim();
            if (text && p.name) {
                chatRef.push({ user: p.name, text: text, timestamp: Date.now() });
                input.value = "";
            }
        };

        function initGame() {
            if (!p.name) { window.location.replace('create.html'); return; }
            var now = Date.now();
            var lastTime = p.lastUpdate || now;
            var diffMs = now - lastTime;
            
            if (p.hp < p.maxHp) p.hp = Math.min(p.maxHp, p.hp + (diffMs / 60000 * 10));
            if (p.energy === undefined) p.energy = 10;
            if (p.energy < 10) p.energy = Math.min(10, p.energy + (diffMs / 600000));
            p.lastUpdate = now;
            localStorage.setItem('rpg_data', JSON.stringify(p));

            document.getElementById('hero-name').innerText = p.name;
            document.getElementById('hero-gold').innerText = Math.floor(p.gold);
            document.getElementById('hero-hp').innerText = Math.floor(p.hp) + '/' + (p.maxHp || 100);
            document.getElementById('hero-nrg').innerText = Math.floor(p.energy) + '/10';
            document.getElementById('max-floor').innerText = p.maxFloorReached || 1;
        }

        // 4. ИНИЦИАЛИЗАЦИЯ ПРИ ЗАГРУЗКЕ
        window.onload = function() {
            var config = {
                apiKey: atob("QUl6YVN5QUpiOTVTa0VyZFFoLWtOZ25BMWg0dWlQZTZhNndVdW9n"),
                authDomain: "://firebaseapp.com",
                databaseURL: "https://firebaseio.com",
                projectId: "shinobichat-f6a61",
                storageBucket: "shinobichat-f6a61.firebasestorage.app",
                messagingSenderId: "150871531506",
                appId: "1:150871531506:web:5ad10630596790dc95d56b"
            };

            if (typeof firebase !== 'undefined') {
                firebase.initializeApp(config);
                chatRef = firebase.database().ref('messages');
                chatRef.limitToLast(20).on('value', function(snap) {
                    var box = document.getElementById('chat-msgs');
                    if(!box) return;
                    box.innerHTML = "";
                    var data = snap.val();
                    if (data) {
                        Object.values(data).forEach(function(m) {
                            box.innerHTML += '<div class="msg"><b>' + m.user + ':</b> ' + m.text + '</div>';
                        });
                        box.scrollTop = box.scrollHeight;
                    }
                });
            }
            initGame();
        };
    </script>
</body>
</html>
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Path of Shinobi - Tavern</title>
    <!-- ИСПРАВЛЕНО: Правильный путь к SDK -->
    <script src="https://telegram.org"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0d0d12; --card: #1a1a24; --accent: #00ffcc; --energy: #00ffcc; }
        body { 
            background: var(--bg); color: #f4e4bc; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            opacity: 0; transition: opacity 0.3s;
        }
        .top-info { width: 100%; padding: 20px; background: linear-gradient(180deg, rgba(212, 175, 55, 0.1) 0%, rgba(0,0,0,0) 100%); text-align: center; box-sizing: border-box; }
        .record-badge { display: inline-block; border: 1px solid var(--gold); padding: 5px 15px; border-radius: 20px; font-size: 11px; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
        .profile-card { background: var(--card); border: 2px solid var(--gold); border-radius: 25px; padding: 25px; width: 85%; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { margin: 0; font-size: 26px; letter-spacing: 1px; color: white; }
        .class-tag { color: var(--accent); font-size: 13px; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; display: block; }
        .stat-row { display: flex; justify-content: space-between; margin: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
        .main-btn { 
            background: linear-gradient(135deg, #800 0%, #c00 100%); color: white; border: none; padding: 18px; 
            width: 85%; border-radius: 15px; font-size: 18px; font-weight: bold; text-transform: uppercase; 
            text-decoration: none; display: block; text-align: center; box-sizing: border-box; margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(200, 0, 0, 0.3);
        }
        .sub-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 85%; }
        .side-btn { background: var(--card); border: 1px solid #333; color: white; padding: 14px; border-radius: 12px; text-decoration: none; font-size: 13px; font-weight: bold; text-align: center; }
        .reset-link { margin-top: auto; padding: 25px; color: #444; font-size: 10px; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-info">
        <div class="record-badge">Личный Рекорд: <span id="max-floor">1</span> этаж</div>
        <h1 id="hero-name">. . .</h1>
        <span class="class-tag" id="hero-class">---</span>
    </div>

    <div class="profile-card">
        <div class="stat-row"><span>💰 Золото:</span> <b id="hero-gold">0</b></div>
        <div class="stat-row"><span>⚡ Энергия:</span> <b id="hero-nrg" style="color:var(--energy)">0/10</b></div>
        <div class="stat-row"><span>❤️ Здоровье:</span> <b id="hero-hp">0/0</b></div>
    </div>

    <a href="map.html" class="main-btn" id="start-btn">В ПУТЬ 🗺️</a>

    <div class="sub-btns">
        <a href="shop.html" class="side-btn">🛒 МАГАЗИН</a>
        <a href="profile.html" class="side-btn">🎒 СУМКА</a>
    </div>

    <div class="reset-link" onclick="resetGame()">Сбросить прогресс</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Развернуть на весь экран

        function initGame() {
            let p;
            try {
                p = JSON.parse(localStorage.getItem('rpg_data'));
            } catch (e) { p = null; }

            // Если данных нет, отправляем создавать персонажа
            if (!p || !p.name) {
                window.location.href = 'create.html';
                return;
            }

            const now = Date.now();
            const lastTime = p.lastUpdate || now;
            const diffMs = now - lastTime;
            
            // HP: +10 в минуту
            const diffMinutes = Math.floor(diffMs / 60000);
            if (diffMinutes > 0 && p.hp < p.maxHp) {
                p.hp = Math.min(p.maxHp, p.hp + (diffMinutes * 10));
            }

            // Энергия: +1 в 10 минут
            if (p.energy === undefined) p.energy = 10;
            const diffNrg = Math.floor(diffMs / 600000);
            if (diffNrg > 0 && p.energy < 10) {
                p.energy = Math.min(10, p.energy + diffNrg);
            }

            p.lastUpdate = now;
            localStorage.setItem('rpg_data', JSON.stringify(p));

            // Обновление интерфейса
            document.getElementById('hero-name').innerText = p.name;
            document.getElementById('hero-class').innerText = p.classTitle || 'Шиноби';
            document.getElementById('hero-gold').innerText = p.gold || 0;
            document.getElementById('hero-hp').innerText = Math.floor(p.hp) + '/' + (p.maxHp || 100);
            document.getElementById('hero-nrg').innerText = (p.energy || 0) + '/10';
            document.getElementById('max-floor').innerText = p.maxFloorReached || 1;

            document.body.style.opacity = '1';
        }

        function resetGame() {
            if (confirm("Удалить героя и начать заново?")) {
                localStorage.removeItem('rpg_data');
                window.location.href = 'create.html';
            }
        }

        setInterval(initGame, 60000);
        initGame();
    </script>
</body>
</html>
