<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0d0d12; }
        body { background: var(--bg); color: #f4e4bc; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1a1a24; border: 2px solid var(--gold); border-radius: 15px; padding: 20px; text-align: left; margin-bottom: 20px; min-height: 100px; }
        #dice { width: 70px; height: 70px; background: #880808; color: white; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 30px; font-weight: bold; border-radius: 12px; border: 2px solid var(--gold); }
        .btn { background: #2b1d0e; border: 1px solid var(--gold); color: var(--gold); padding: 16px; width: 100%; border-radius: 12px; font-size: 16px; margin-bottom: 10px; cursor: pointer; font-weight: bold; }
        .anim { animation: shake 0.3s infinite; }
        @keyframes shake { 0% {transform: rotate(5deg)} 50% {transform: rotate(-5deg)} 100% {transform: rotate(5deg)} }
    </style>
</head>
<body>
    <h2 style="color: var(--gold)">ANIME AI RPG</h2>
    <div id="dice">d20</div>
    <div class="card" id="st">Мастер: Выбери действие, брось кубик и читай историю в чате бота!</div>
    <div id="opts">
        <button class="btn" onclick="send('Исследовать темный лес')">🌲 Пойти в лес</button>
        <button class="btn" onclick="send('Искать сокровища в пещере')">💎 Искать лут</button>
        <button class="btn" onclick="send('Напасть на патруль Орочимару')">⚔️ Напасть!</button>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        function send(text) {
            const die = document.getElementById('dice');
            die.classList.add('anim');
            const roll = Math.floor(Math.random() * 20) + 1;
            
            setTimeout(() => {
                die.innerText = roll;
                die.classList.remove('anim');
                // Отправляем данные БОТУ, бот сам пойдет к ИИ
                tg.sendData(JSON.stringify({msg: text, roll: roll}));
                document.getElementById('st').innerText = "Судьба решена! Закрой игру и смотри ответ в чате.";
                document.getElementById('opts').style.display = 'none';
            }, 600);
        }
    </script>
</body>
</html>
